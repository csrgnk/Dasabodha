<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namo Narayanaya Bhakthi Channel</title>

    <link rel="icon" type="image/png" href="https://omnnbc.com/assets/images/Omnnbc-new.png">

    <style>
        :root {
            --site-pink: #E91E63;
            --primary-blue: #0D6EFD;
            --dark-blue: #001F3F;
            --white: #ffffff;
            --bg-light: #F8F9FA;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--bg-light); 
        }

        /* 🔘 NAVIGATION SETUP - TWO ROWS */
        .nav-section { background: var(--dark-blue); padding: 5px 0; }
        .nav-row {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px 10px;
            gap: 8px;
            scrollbar-width: none;
        }
        .nav-row::-webkit-scrollbar { display: none; }

        .btn-menu {
            background: var(--white);
            color: var(--site-pink);
            text-decoration: none;
            font-size: 11px;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--site-pink);
            text-transform: uppercase;
        }

        /* 🏛️ HEADER (Non-Sticky) */
        header { 
            background: var(--white); 
            padding: 20px 10px; 
            text-align: center;
            border-bottom: 3px solid var(--site-pink);
        }

        .site-logo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin-bottom: 8px;
            border: 2px solid var(--site-pink);
        }

        .site-title { 
            color: var(--site-pink); 
            font-weight: 900; 
            margin: 0;
            line-height: 1.2;
        }

        /* Mobile View: 2 Lines */
        .title-line-1 { font-size: 1.5rem; display: block; }
        .title-line-2 { font-size: 1.2rem; display: block; }

        /* 🔍 SEARCH BOX - COMPACT */
        .search-area { padding: 20px; text-align: center; }
        #postSearch { 
            width: 80%; 
            max-width: 260px; /* Reduced width */
            padding: 10px 15px; 
            border-radius: 25px; 
            border: 2px solid var(--primary-blue); 
            outline: none;
            font-size: 14px;
        }

        /* 📄 POST CARDS - BLUE TOP, BLACK TEXT */
        .content-wrapper { max-width: 700px; margin: auto; padding: 10px; }
        .post-card { 
            background: var(--white); 
            border-radius: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary-blue); 
            overflow: hidden;
        }
        .post-body { padding: 20px; }
        .post-title-link { 
            color: var(--primary-blue); 
            font-size: 1.4rem; 
            font-weight: 700;
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }
        .post-text { color: #000000; line-height: 1.6; font-size: 1.05rem; margin: 0; }

        /* 🔘 DASHAKAM SELECTOR */
        .dashakam-nav { background: #fff; padding: 25px; text-align: center; border-top: 1px solid #eee; }
        .dash-circle { 
            min-width: 42px; height: 42px; border-radius: 50%; 
            border: 1px solid #ccc; background: #fff; font-weight: 700;
            cursor: pointer; margin: 4px;
        }
        .dash-circle.active { background: var(--site-pink); color: #fff; border-color: var(--site-pink); }

        footer { background: var(--dark-blue); color: #fff; text-align: center; padding: 40px; }

        /* 💻 DESKTOP ADJUSTMENTS */
        @media (min-width: 768px) {
            .title-line-1, .title-line-2 { display: inline; font-size: 2rem; }
            .title-line-2 { margin-left: 10px; }
            .site-logo { width: 65px; height: 65px; }
        }
    </style>
</head>
<body>

<nav class="nav-section">
    <div class="nav-row">
        <a href="/" class="btn-menu">Home</a>
        <a href="/about-us" class="btn-menu">About Us</a>
        <a href="/contact-us" class="btn-menu">Contact Us</a>
        <a href="/privacy-policy" class="btn-menu">Privacy Policy</a>
    </div>
    <div class="nav-row" style="padding-top: 0; border-top: 1px solid rgba(255,255,255,0.1);">
        <a href="https://omnnbc.com" target="_blank" class="btn-menu">Main Site</a>
        <a href="https://upasana-chandrika.omnnbc.in/" target="_blank" class="btn-menu">Upasana Chandrika</a>
        <a href="https://manache-shlok.omnnbc.in/" target="_blank" class="btn-menu">Manache Shlok</a>
    </div>
</nav>

<header>
    <img src="https://omnnbc.com/assets/images/Omnnbc-new.png" alt="Logo" class="site-logo">
    <h1 class="site-title">
        <span class="title-line-1">NAMO NARAYANAYA</span>
        <span class="title-line-2">BHAKTHI CHANNEL</span>
    </h1>
</header>

<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam here...">
</div>

<main class="content-wrapper" id="postsContainer">
    <div style="text-align:center; padding:50px;">🙏 Loading...</div>
</main>

<section class="dashakam-nav">
    <div style="font-weight:800; margin-bottom:15px; color: var(--dark-blue);">SELECT DASHAKAM</div>
    <div class="nav-row" id="dashButtons"></div>
</section>

<footer>
    <p>© 2026 Namo Narayanaya Bhakthi Channel</p>
    <p style="font-size: 0.8rem; opacity: 0.7;">Managed by Sangameshwar</p>
</footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;

    document.addEventListener("DOMContentLoaded", () => {
        fetch("./data/posts.json?v=" + Date.now())
        .then(res => res.json())
        .then(data => {
            allPosts = data;
            renderPage();
            setupDashNav();
        })
        .catch(err => {
            document.getElementById("postsContainer").innerHTML = "Error loading content.";
        });
    });

    function renderPage(query = "") {
        const container = document.getElementById("postsContainer");
        const filtered = query 
            ? allPosts.filter(p => p.title.toLowerCase().includes(query.toLowerCase()))
            : allPosts.filter(p => parseInt(p.dashakam) === currentDashakam);

        if (filtered.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>No content found.</p>";
            return;
        }

        container.innerHTML = filtered.map(post => `
            <article class="post-card">
                <div class="post-body">
                    <a href="./${post.url}/" class="post-title-link">${post.title}</a>
                    <p class="post-text">${post.description ? post.description.substring(0, 140) : "మరింత సమాచారం కోసం క్లిక్ చేయండి"}...</p>
                </div>
            </article>
        `).join('');
    }

    function setupDashNav() {
        const wrap = document.getElementById("dashButtons");
        for(let i=1; i<=20; i++) {
            const btn = document.createElement("button");
            btn.innerText = i;
            btn.className = "dash-circle" + (i === currentDashakam ? " active" : "");
            btn.onclick = () => {
                currentDashakam = i;
                document.querySelectorAll(".dash-circle").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById("postSearch").value = "";
                renderPage();
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            wrap.appendChild(btn);
        }
    }

    document.getElementById("postSearch").addEventListener("input", e => {
        renderPage(e.target.value);
    });

    // Right-Click Protection
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
