<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>
    <style>
        :root {
            --primary: #C2185B;
            --secondary: #002366;
            --accent: #FFD700;
            --bg: #f7f9fc;
            --card: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: var(--bg);
            color: #333;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* STICKY HEADER FOR MOBILE */
        header {
            background: #fff;
            padding: 15px 10px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .site-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0;
            letter-spacing: -0.5px;
        }

        .sub-title-box {
            background: var(--secondary);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* FIXED SEARCH BOX DISPLAY */
        .search-container {
            padding: 15px;
            background: #fff;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #eee;
        }

        #postSearch {
            width: 100%;
            max-width: 340px;
            padding: 12px 15px;
            font-size: 16px; /* Prevents mobile zoom */
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            background: #fdfdfd;
        }

        #postSearch:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(194, 24, 91, 0.1);
        }

        /* POST CARDS */
        .container {
            max-width: 700px;
            margin: auto;
            padding: 12px;
            min-height: 60vh;
        }

        .post-card {
            background: var(--card);
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }

        .post-card h2 {
            margin: 0 0 8px;
            font-size: 1.1rem;
            color: var(--secondary);
            line-height: 1.4;
        }

        .post-card h2 a {
            text-decoration: none;
            color: inherit;
        }

        .post-meta-desc {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .read-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* HORIZONTAL DASHAKAM SLIDER */
        .pagination-wrapper {
            background: #fff;
            padding: 20px 0;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .page-numbers-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 15px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* Firefox */
        }

        .page-numbers-container::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .pg-btn {
            min-width: 110px;
            padding: 10px 15px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            background: white;
            color: var(--secondary);
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
            cursor: pointer;
        }

        .pg-btn.active {
            background: var(--secondary);
            color: var(--accent);
            border-color: var(--secondary);
        }

        /* BACK TO TOP BUTTON */
        #backToTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
        }

        footer {
            background: var(--secondary);
            color: white;
            text-align: center;
            padding: 30px 15px;
            font-size: 0.85rem;
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            .site-title { font-size: 1.15rem; }
            .post-card h2 { font-size: 1.05rem; }
            .container { padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="site-title">Namo Narayanaya Bhakthi Channel</div>
    <div class="sub-title-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-container">
    <input type="text" id="postSearch" placeholder="Search Samasam or Title...">
</div>

<div class="container" id="postsContainer">
    <div style="text-align:center; padding:40px;">Loading sacred content...</div>
</div>

<div class="pagination-wrapper">
    <p style="font-weight:bold; color:var(--primary); font-size: 0.9rem; margin:0 0 10px;">Select Dashakam</p>
    <div class="page-numbers-container" id="paginationWrapper"></div>
</div>

<button id="backToTop" onclick="scrollToTop()">↑</button>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel<br>
    <small>Spreading the wisdom of Samartha Ramadasu</small>
</footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;

    // Fetch Data
    fetch("./data/posts.json?v=" + Date.now())
        .then(res => res.json())
        .then(data => {
            allPosts = data.sort((a, b) => {
                if (parseInt(a.dashakam) !== parseInt(b.dashakam)) {
                    return parseInt(a.dashakam) - parseInt(b.dashakam);
                }
                const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                return numA - numB;
            });
            renderPage();
        });

    function renderPage() {
        const container = document.getElementById("postsContainer");
        container.innerHTML = "";
        
        const posts = allPosts.filter(p => parseInt(p.dashakam) === currentDashakam);

        if (posts.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:50px; color:#999; font-size:0.9rem;">
                Lyrics for Dashakam ${currentDashakam} will be updated soon.</div>`;
            setupPagination();
            return;
        }

        posts.forEach(post => {
            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <h2><a href="./${post.url}/">${post.title}</a></h2>
                <div class="post-meta-desc">${post.description || "Read the complete Telugu lyrics and meaning for this samasam."}</div>
                <a href="./${post.url}/" class="read-link">Read Full Lyrics →</a>
            `;
            container.appendChild(card);
        });
        setupPagination();
    }

    function setupPagination() {
        const wrapper = document.getElementById("paginationWrapper");
        wrapper.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const btn = document.createElement("button");
            btn.className = "pg-btn" + (i === currentDashakam ? " active" : "");
            btn.innerText = "Dashakam " + i;
            btn.onclick = () => {
                currentDashakam = i;
                window.scrollTo({top: 0, behavior: 'smooth'});
                renderPage();
            };
            wrapper.appendChild(btn);
        }
        // Auto-scroll to active button in the slider
        const activeBtn = wrapper.querySelector('.active');
        if(activeBtn) {
            wrapper.scrollTo({ left: activeBtn.offsetLeft - 50, behavior: 'smooth' });
        }
    }

    // Improved Search Logic
    document.getElementById("postSearch").addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase().trim();
        const container = document.getElementById("postsContainer");
        
        if (term === "") {
            renderPage();
            return;
        }

        const filtered = allPosts.filter(p => 
            p.title.toLowerCase().includes(term) || 
            (p.description && p.description.toLowerCase().includes(term))
        );

        container.innerHTML = "";
        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:40px;">No Samasams found for "${term}"</div>`;
            return;
        }

        filtered.forEach(post => {
            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <h2><a href="./${post.url}/">${post.title}</a></h2>
                <div class="post-meta-desc">${post.description || ""}</div>
                <a href="./${post.url}/" class="read-link">Read Lyrics →</a>
            `;
            container.appendChild(card);
        });
    });

    // Back to Top Functionality
    window.onscroll = function() {
        const btn = document.getElementById("backToTop");
        if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
            btn.style.display = "flex";
        } else {
            btn.style.display = "none";
        }
    };

    function scrollToTop() {
        window.scrollTo({top: 0, behavior: 'smooth'});
    }
</script>

</body>
</html>
