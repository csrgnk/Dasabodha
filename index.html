<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official Telugu Lyrics for Dasabodha Grantha by Namo Narayanaya Bhakthi Channel.">
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>

    <script type="text/javascript">
        // Security: Disable right-click and copy
        document.addEventListener('contextmenu', e => e.preventDefault(), false);
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['c', 'u', 's', 'a', 'p'].includes(e.key)) e.preventDefault();
        }, false);
        document.onselectstart = () => false;
    </script>

    <style>
        :root {
            --primary: #D35400;      /* Orange */
            --secondary: #5D4037;    /* Brown */
            --accent: #FFD700;       /* Gold */
            --bg: #FFF9E1;           /* Light Yellow */
            --top-links-bg: #5D4037; /* Brown */
            --outer-links-bg: #D35400; /* Orange */
            --site-pink: #E91E63;    /* Pink */
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #222; overflow-x: hidden; -webkit-user-select: none; user-select: none; }

        /* ↔️ HORIZONTAL SCROLL MENUS */
        .top-links, .outer-links {
            display: flex; overflow-x: auto; white-space: nowrap;
            gap: 15px; padding: 10px; scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .top-links::-webkit-scrollbar, .outer-links::-webkit-scrollbar { display: none; }
        .top-links { background: var(--top-links-bg); }
        .outer-links { background: var(--outer-links-bg); }

        .fixed-nav-wrapper a {
            color: #fff; text-decoration: none; font-size: 0.9rem;
            font-weight: 700; padding: 6px 8px; flex-shrink: 0;
        }

        /* 🏛️ HEADER SETUP */
        header { background: #fff; padding: 25px 10px; border-bottom: 4px solid var(--accent); }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; width: 100%; }
        .header-logo { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--site-pink); }
        
        .site-title-main { color: var(--site-pink); margin: 0; line-height: 1.2; text-align: left; }
        
        .line-1 { font-size: 1.45rem; display: block; font-weight: 700; white-space: nowrap; }
        .line-2 { font-size: 1.2rem; display: block; font-weight: 600; white-space: nowrap; }

        @media (min-width: 768px) {
            .line-1, .line-2 { display: inline; font-size: 1.9rem; }
            .line-2 { margin-left: 10px; }
            .header-logo { width: 70px; height: 70px; }
        }

        .sub-container { text-align: center; margin-top: 12px; }
        .site-title-sub { background: #FFF3E0; padding: 6px 15px; border-radius: 20px; font-size: 0.82rem; color: #5D4037; display: inline-block; font-weight: 600; border: 1px solid var(--accent); }

        /* 🔍 SEARCH BOX */
        .search-area { width: 100%; display: flex; justify-content: center; margin: 25px 0; }
        #postSearch { width: 70%; max-width: 250px; padding: 12px; border-radius: 25px; border: 2px solid var(--accent); text-align: center; font-size: 15px; outline: none; background: #fff; }

        /* 📄 CONTENT */
        .container { max-width: 700px; margin: auto; padding: 0 15px; min-height: 300px; }
        .post-card { background: #fff; border-radius: 8px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; }
        .post-card:hover { border-left-color: var(--secondary); transform: translateY(-2px); }
        .post-title-click { margin: 0 0 8px; font-size: 1.25rem; color: var(--secondary); font-weight: 700; }

        /* 🔘 DASHAKAM NAV */
        .nav-section { text-align: center; padding: 30px 0; background: #FFFDE7; margin-top: 30px; border-top: 2px solid var(--accent); }
        .scroll-container { display: flex; overflow-x: auto; gap: 10px; padding: 15px; white-space: nowrap; scrollbar-width: none; }
        .dash-btn { min-width: 100px; padding: 10px; border-radius: 20px; background: #fff; cursor: pointer; border: 1px solid #ddd; font-weight: 700; flex-shrink: 0; transition: 0.2s; }
        .dash-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        footer { background: var(--secondary); color: #fff; text-align: center; padding: 25px; font-size: 0.9rem; border-top: 4px solid var(--accent); }
    </style>
</head>

<body>

<div class="fixed-nav-wrapper">
    <div class="top-links">
        <a href="/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
        <a href="/privacy-policy">Privacy Policy</a>
    </div> 
    <div class="outer-links">
        <a href="https://omnnbc.com/" rel="noopener" target="_blank">Main Site</a>
        <a href="https://upasana-chandrika.omnnbc.in/" rel="noopener" target="_blank">Upasana Chandrika</a>
        <a href="https://manache-shlok.omnnbc.in/" rel="noopener" target="_blank">Manache Shlok Telugu</a>
        <a href="https://manache-shlok-hindi.omnnbc.com" rel="noopener" target="_blank">Manache Shlok Hindi</a>
    </div>
</div>

<header>
    <div class="header-container">
        <img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="header-logo" alt="Logo">
        <div class="site-title-wrapper">
            <h1 class="site-title-main">
                <span class="line-1">Namo Narayanaya</span>
                <span class="line-2">Bhakthi Channel</span>
            </h1>
        </div>
    </div>
    <div class="sub-container">
        <div class="site-title-sub">Dasabodha Grantha Telugu Lyrics</div>
    </div>
</header>

<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam..." aria-label="Search">
</div>

<main class="container" id="postsContainer">
    <div style="text-align:center;padding:40px;">🙏 Loading Samasams...</div>
</main>

<nav class="nav-section">
    <p><b style="color:var(--secondary);">SELECT DASHAKAM</b></p>
    <div class="scroll-container" id="dashButtons"></div>
</nav>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;
    let searchTimeout = null;

    document.addEventListener("DOMContentLoaded", () => {
        fetch("./data/posts.json?v=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            allPosts = data;
            renderPage();
            setupDashNav();
        })
        .catch(err => {
            console.error("Error loading posts:", err);
            document.getElementById("postsContainer").innerHTML = "Error loading content.";
        });
    });

    function openPost(url) {
        let cleanSlug = url.replace(".html", "").replace(/\/$/, "");
        window.location.href = window.location.origin + "/" + cleanSlug + "/";
    }

    function renderPage(searchTerm = "") {
        const container = document.getElementById("postsContainer");
        
        let filtered = searchTerm 
            ? allPosts.filter(p => p.title.toLowerCase().includes(searchTerm.toLowerCase()))
            : allPosts.filter(p => parseInt(p.dashakam) === currentDashakam)
                .sort((a, b) => {
                    const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                    const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                    return numA - numB;
                });

        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center;padding:40px;">No Samasams found.</div>`;
            return;
        }

        container.innerHTML = "";
        filtered.forEach(post => {
            const card = document.createElement("article");
            card.className = "post-card";
            card.onclick = () => openPost(post.url);
            card.innerHTML = `
                <h2 class="post-title-click">${post.title}</h2>
                <p style="font-size:0.9rem; color:#555;">${post.description ? post.description.substring(0,120) : "Dasabodha Telugu Lyrics..."}...</p>
            `;
            container.appendChild(card);
        });
    }

    function setupDashNav(){
        const wrap = document.getElementById("dashButtons");
        wrap.innerHTML = "";
        for(let i=1;i<=20;i++){
            const btn = document.createElement("button");
            btn.innerText = "Dashakam " + i;
            btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");
            btn.onclick = () => {
                currentDashakam = i;
                document.querySelectorAll(".dash-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.getElementById("postSearch").value = "";
                renderPage();
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            wrap.appendChild(btn);
        }
    }

    document.getElementById("postSearch").addEventListener("input", e => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => renderPage(e.target.value), 300);
    });
</script>

</body>
</html>
