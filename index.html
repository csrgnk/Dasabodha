<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasabodha - Namo Narayanaya Bhakthi Channel</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script type="text/javascript">
        // Security: Disable Right-Click and Copy
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73 || e.keyCode === 123)) {
                return false;
            }
        };
        document.onselectstart = function() { return false; };
    </script>

    <style>
        body { 
            margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f9; 
            display: flex; flex-direction: column; min-height: 100vh; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        
        .nav-menu { 
            background: #C2185B; padding: 12px 5px; text-align: center; position: sticky; top: 0; z-index: 1000; 
            white-space: nowrap; overflow-x: auto; 
        }
        .nav-menu a { color: white; text-decoration: none; margin: 0 12px; font-weight: bold; font-size: 14px; display: inline-block; }
        .nav-menu a.home-btn { background: #fff; color: #C2185B; padding: 5px 15px; border-radius: 4px; }

        header { 
            background:#fff9db; padding:20px 10px; text-align:center; 
            border-bottom: 3px solid #FFD700;
        }
        .header-main { font-size: 1.6rem; font-weight: bold; color: #C2185B; line-height: 1.2; }
        
        .sub-title-box {
            background: #002366; color: #ffffff; padding: 6px 18px; border-radius: 50px; 
            font-size: 0.9rem; display: inline-block; margin-top: 10px; font-weight: 500; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .search-container { max-width: 800px; margin: 15px auto; padding: 0 15px; }
        #postSearch { 
            width: 100%; padding: 12px 20px; font-size: 16px; 
            border: 2px solid #C2185B; border-radius: 30px; outline: none; box-sizing: border-box;
        }
        
        .container { max-width:800px; margin:auto; padding:15px; flex: 1; }
        .post-card { 
            background:#FFFDE7; padding:20px; margin-bottom:15px; border-radius:12px; 
            box-shadow:0 2px 8px rgba(0,0,0,0.08); border-left: 6px solid #C2185B; 
        }
        .post-card h2 { margin:0 0 8px; color:#002366; font-size: 1.25rem; }
        .post-meta-desc { color: #555; font-size: 14px; margin: 8px 0; line-height: 1.5; }
        
        .coming-soon { text-align: center; padding: 40px; color: #C2185B; font-weight: bold; font-size: 1.1rem; }

        .pagination-wrapper {
            display: flex; flex-direction: column; align-items: center; 
            margin: 30px 0; padding: 10px; border-top: 2px solid #FFD700;
        }
        .page-numbers-container {
            display: flex; gap: 10px; overflow-x: auto; width: 100%; 
            padding: 15px 5px; scrollbar-width: thin;
        }
        .pg-btn {
            min-width: 125px; padding: 9px; border: 2px solid #002366; 
            border-radius: 25px; background: #fff; color: #002366; 
            font-weight: bold; cursor: pointer; flex-shrink: 0; transition: 0.3s; font-size: 13px;
        }
        .pg-btn.active { background: #002366; color: #FFD700; }

        footer { background: #C2185B; color: white; text-align: center; padding: 20px; margin-top: auto; }
        img { pointer-events: none; -webkit-user-drag: none; }
    </style>
</head>
<body>

<nav class="nav-menu">
    <a href="./" class="home-btn">Home</a>
    <a href="./about-us">About Us</a>
    <a href="./contact-us">Contact Us</a>
    <a href="./privacy-policy">Privacy Policy</a>
    <a href="https://omnnbc.in/">Main Site</a>
</nav>

<header>
    <div class="header-main">Namo Narayanaya Bhakthi Channel</div>
    <div class="sub-title-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-container">
    <input type="text" id="postSearch" placeholder="Search for Dashakam or Samasam...">
</div>

<div class="container" id="postsContainer">Loading Content...</div>

<div class="pagination-wrapper">
    <p style="font-weight: bold; color: #C2185B; margin-bottom: 10px;">Select Dashakam:</p>
    <div class="page-numbers-container" id="paginationWrapper"></div>
</div>

<footer><p>© 2026 Namo Narayanaya Bhakthi Channel</p></footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;

    // PATH DETECTION: Automatically works on dasabodha.omnnbc.in and csrgnk.github.io/Dasabodha
    const repoPath = window.location.hostname.includes('github.io') ? "/Dasabodha" : "";
    const cacheBuster = "?v=" + new Date().getTime();

    fetch(`${repoPath}/data/posts.json${cacheBuster}`)
    .then(res => {
        if (!res.ok) throw new Error('File not found at ' + `${repoPath}/data/posts.json`);
        return res.json();
    })
    .then(data => {
        allPosts = data.sort((a, b) => {
            if (parseInt(a.dashakam) !== parseInt(b.dashakam)) {
                return parseInt(a.dashakam) - parseInt(b.dashakam);
            }
            const matchA = a.url.match(/samasam-(\d+)/);
            const matchB = b.url.match(/samasam-(\d+)/);
            const numA = matchA ? parseInt(matchA[1]) : 0;
            const numB = matchB ? parseInt(matchB[1]) : 0;
            return numA - numB;
        });
        renderPage();
    })
    .catch(err => {
        console.error(err);
        document.getElementById("postsContainer").innerHTML = 
            `<div class='coming-soon'>Content currently unavailable.<br>Please ensure your <b>data/posts.json</b> file exists in GitHub.</div>`;
    });

    function renderPage(filteredData = null) {
        const container = document.getElementById("postsContainer");
        container.innerHTML = "";

        let displayPosts = filteredData || allPosts.filter(post => post.dashakam == currentDashakam);

        if (displayPosts.length === 0) {
            container.innerHTML = `<div class='coming-soon'>Posts are coming soon for Dashakam ${currentDashakam}</div>`;
            if(!filteredData) setupPagination();
            return;
        }

        displayPosts.forEach(post => {
            // Fixes link paths for both environments
            const cleanId = post.url.replace('posts/', '').replace('.html', '');
            const virtualUrl = `${repoPath}/posts/${cleanId}.html`;

            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <h2><a href="${virtualUrl}" style="text-decoration:none; color:#002366;">${post.title}</a></h2>
                <div style="font-size: 11px; color: #999; margin-bottom: 8px;">Date: ${post.publish_date}</div>
                <div class="post-meta-desc">${post.description}</div>
                <a href="${virtualUrl}" style="color:#C2185B; font-weight:bold; text-decoration:none; font-size:13px;">READ LYRICS →</a>
            `;
            container.appendChild(card);
        });

        if(!filteredData) setupPagination();
        window.scrollTo(0, 0);
    }

    function setupPagination() {
        const wrapper = document.getElementById("paginationWrapper");
        wrapper.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const btn = document.createElement("button");
            btn.className = `pg-btn ${i === currentDashakam ? 'active' : ''}`;
            btn.innerText = `Dashakam ${i}`;
            btn.onclick = () => { 
                currentDashakam = i; 
                document.getElementById('postSearch').value = ""; 
                renderPage(); 
            };
            wrapper.appendChild(btn);
        }
    }

    document.getElementById('postSearch').addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filtered = allPosts.filter(p => p.title.toLowerCase().includes(searchTerm));
        renderPage(searchTerm === "" ? null : filtered);
    });
</script>
</body>
</html>
