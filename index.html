<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" id="metaDesc" content="Official Telugu Lyrics for Dasabodha Grantha by Namo Narayanaya Bhakthi Channel.">
    
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>

    <script type="text/javascript">
        document.addEventListener('contextmenu', e => e.preventDefault(), false);
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['c', 'u', 's', 'a', 'p'].includes(e.key)) e.preventDefault();
        }, false);
        document.onselectstart = () => false;
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #3FA3A1;
            --secondary: #1A1A1A;
            --accent: #F4D03F;
            --bg: #F4FBFB;
            --top-links-bg: #145A5A;
            --outer-links-bg: #3FA3A1;
            --site-pink: #E91E63;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #222; overflow-x: hidden; -webkit-user-select: none; user-select: none; }
        .top-links, .outer-links { display: flex; overflow-x: auto; white-space: nowrap; gap: 15px; padding: 10px; scrollbar-width: none; }
        .top-links { background: var(--top-links-bg); }
        .outer-links { background: var(--outer-links-bg); }
        .nav-link { color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 700; padding: 6px 8px; flex-shrink: 0; }
        header { background: #fff; padding: 25px 10px; border-bottom: 3px solid var(--accent); text-align: center; }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .header-logo { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; }
        .site-title-main { font-family: 'Crimson Text', serif; color: var(--site-pink); margin: 0; }
        .line-1 { font-size: 1.7rem; display: block; font-weight: 700; }
        .line-2 { font-size: 1.3rem; display: block; font-weight: 600; }
        .site-title-sub { background: #eee; padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; color: #444; display: inline-block; margin-top: 10px; }
        .search-area { width: 100%; display: flex; justify-content: center; margin: 25px 0; }
        #postSearch { width: 85%; max-width: 350px; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; outline: none; text-align: center; font-size: 16px; }
        .container { max-width: 700px; margin: auto; padding: 0 15px; min-height: 450px; }
        .post-card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 12px; border-left: 5px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); cursor: pointer; }
        .post-title-click { margin: 0; font-size: 1.2rem; color: var(--secondary); font-weight: 600; }
        .nav-section { text-align: center; padding: 30px 10px; background: #fff; margin-top: 40px; border-top: 1px solid #eee; }
        .scroll-container { display: flex; overflow-x: auto; gap: 10px; padding: 15px 5px; }
        .dash-btn { min-width: 115px; padding: 12px; border-radius: 25px; background: #fff; border: 1px solid #ddd; font-weight: 700; cursor: pointer; flex-shrink: 0; }
        .dash-btn.active { background: var(--secondary); color: var(--accent); border-color: var(--secondary); }
        footer { background: #145A5A; color: #fff; text-align: center; padding: 30px; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="fixed-nav-wrapper">
    <div class="top-links">
        <a href="/" class="nav-link">Home</a>
        <a href="/about-us" class="nav-link">About Us</a>
        <a href="/contact-us" class="nav-link">Contact Us</a>
        <a href="/privacy-policy" class="nav-link">Privacy Policy</a>
    </div> 
    <div class="outer-links">
        <a href="https://omnnbc.com/" class="nav-link" target="_blank">Main Site</a>
        <a href="https://upasana-chandrika.omnnbc.in/" class="nav-link" target="_blank">Upasana Chandrika</a>
        <a href="https://manache-shlok.omnnbc.in/" class="nav-link" target="_blank">Manache Shlok Telugu</a>
        <a href="https://manache-shlok.omnnbc.in/hindi/" class="nav-link" target="_blank">Manache Shlok Hindi</a>
    </div>
</div>

<header>
    <div class="header-container">
        <img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="header-logo" alt="Logo">
        <div class="site-title-wrapper">
            <h1 class="site-title-main">
                <span class="line-1">Namo Narayanaya</span>
                <span class="line-2">Bhakthi Channel</span>
            </h1>
        </div>
    </div>
    <div class="site-title-sub">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam...">
</div>

<main class="container" id="postsContainer">
    <div style="text-align:center;padding:50px;">🙏 Loading...</div>
</main>

<nav class="nav-section">
    <p><b>SELECT DASHAKAM</b></p>
    <div class="scroll-container" id="dashButtons"></div>
</nav>

<footer>© 2026 Namo Narayanaya Bhakthi Channel</footer>

<script>
let allPosts = [];
let currentDashakam = 1;

document.addEventListener("DOMContentLoaded", () => {
    fetch("./data/posts.json?v=" + Date.now())
    .then(res => res.json())
    .then(data => {
        allPosts = data.map(p => {
            const dMatch = p.url.match(/dashakam-(\d+)/);
            const sMatch = p.url.match(/samasam-(\d+)/);
            return { ...p, dNum: dMatch ? parseInt(dMatch[1]) : 0, sNum: sMatch ? parseInt(sMatch[1]) : 0 };
        });
        renderPage();
        setupDashNav();
    });
});

function renderPage(searchTerm = "") {
    const container = document.getElementById("postsContainer");
    let filtered = searchTerm 
        ? allPosts.filter(p => p.title.toLowerCase().includes(searchTerm.toLowerCase()))
        : allPosts.filter(p => p.dNum === currentDashakam).sort((a, b) => a.sNum - b.sNum);

    if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:50px;">No results found.</div>`;
        return;
    }

    container.innerHTML = "";
    filtered.forEach(post => {
        const card = document.createElement("div");
        card.className = "post-card";
        
        // CRITICAL FIX: Direct pathing to match your server structure
        // This creates: https://dasabodha.omnnbc.in/posts/dashakam-1-samasam-5-lyrics.html
        card.onclick = () => {
            window.location.href = window.location.origin + "/posts/" + post.url + ".html";
        };
        
        card.innerHTML = `<h2 class="post-title-click">${post.title}</h2><p style="color:#666;font-size:0.9rem;">${post.description || "Click to read lyrics"}</p>`;
        container.appendChild(card);
    });
}

function setupDashNav() {
    const wrap = document.getElementById("dashButtons");
    wrap.innerHTML = "";
    for(let i=1; i<=20; i++) {
        const btn = document.createElement("button");
        btn.innerText = "Dashakam " + i;
        btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");
        btn.onclick = () => {
            currentDashakam = i;
            document.querySelectorAll(".dash-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            renderPage();
            window.scrollTo({top: 0, behavior: 'smooth'});
        };
        wrap.appendChild(btn);
    }
}

document.getElementById("postSearch").addEventListener("input", e => renderPage(e.target.value));
</script>
</body>
</html>
