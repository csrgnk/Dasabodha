</head>

<body>

<div class="top-links">
<a href="/">Home</a>
<a href="/about-us">About</a>
<a href="/contact-us">Contact</a>
</div>

<div class="outer-links">
<a href="https://omnnbc.com" target="_blank">Main Site</a>
</div>

<header>
<div class="header-container">
<img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="header-logo">

<h1 class="site-title-main">
<span class="line-1">Namo Narayanaya</span>
<span class="line-2">Bhakthi Channel</span>
</h1>
</div>
</header>

<div class="search-area">
<input type="text" id="postSearch" placeholder="Search Samasam...">
</div>

<main class="container" id="postsContainer">
<div style="text-align:center;padding:40px;">Loading...</div>
</main>

<nav class="nav-section" id="dashButtons"></nav>

<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>
let allPosts=[];
let currentDashakam=1;

fetch("/data/posts.json?v="+Date.now())
.then(res=>res.json())
.then(data=>{
    allPosts=data;
    renderPage();
    setupDashNav();
});

/* ✅ FIXED LINK */
function openPost(url){
    window.location.href="/posts/"+url+".html";
}

function renderPage(search=""){
let filtered=search
? allPosts.filter(p=>p.title.toLowerCase().includes(search.toLowerCase()))
: allPosts.filter(p=>p.dashakam==currentDashakam);

document.getElementById("postsContainer").innerHTML=filtered.map(p=>`
<div class="post-card" onclick="openPost('${p.url}')">
<h3>${p.title}</h3>
<p>${p.description||""}</p>
</div>
`).join("");
}

function setupDashNav(){
let wrap=document.getElementById("dashButtons");

for(let i=1;i<=20;i++){
let btn=document.createElement("button");
btn.innerText="Dashakam "+i;
btn.className="dash-btn";

btn.onclick=()=>{
currentDashakam=i;
renderPage();
};

wrap.appendChild(btn);
}
}

document.getElementById("postSearch").addEventListener("input",e=>{
renderPage(e.target.value);
});
</script>

</body>
</html>
