<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #922B21; /* Deep Madder Red */
            --secondary: #1C2833; /* Dark Charcoal */
            --accent: #D4AC0D; /* Temple Gold */
            --bg: #F9F7F2; /* Soft Parchment */
            --card: #FFFFFF;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--secondary);
            line-height: 1.6;
        }

        /* HEADER */
        header {
            background: #fff;
            padding: 40px 15px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .site-title-main {
            font-family: 'Crimson Text', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .site-title-sub {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--secondary);
            margin-top: 5px;
            opacity: 0.8;
        }

        .sub-title-box {
            background: var(--primary);
            color: #fff;
            padding: 6px 20px;
            border-radius: 4px;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 15px;
            font-weight: 500;
        }

        /* SEARCH BAR */
        .search-area {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }

        #postSearch {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        #postSearch:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(146, 43, 33, 0.1);
        }

        /* CARDS */
        .container {
            max-width: 800px;
            margin: 0 auto 50px;
            padding: 0 15px;
            min-height: 400px;
        }

        .post-card {
            background: var(--card);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid #eee;
            position: relative;
            transition: 0.2s;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        /* Samasam Badge */
        .samasam-badge {
            display: inline-block;
            background: #FEF9E7;
            color: #9A7D0A;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 10px;
            border: 1px solid #F9E79F;
        }

        .post-card h2 {
            margin: 0 0 12px;
            font-family: 'Crimson Text', serif;
            font-size: 1.6rem;
            color: var(--primary);
        }

        .post-card h2 a { text-decoration: none; color: inherit; }

        .post-meta-desc {
            font-size: 0.95rem;
            color: #5D6D7E;
            margin-bottom: 20px;
        }

        .read-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .read-link:hover {
            border-bottom-color: var(--primary);
        }

        /* COMING SOON MESSAGE */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: #fff;
            border-radius: 12px;
            border: 2px dashed #ddd;
        }

        .empty-state h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        /* PAGINATION SCROLLER */
        .nav-section {
            background: #fff;
            padding: 30px 0;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .scroll-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 20px;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar { display: none; }

        .dash-btn {
            min-width: 110px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: 0.3s;
        }

        .dash-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        footer {
            background: var(--secondary);
            color: #fff;
            text-align: center;
            padding: 40px 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header>
    <div class="site-title-main">Namo Narayanaya</div>
    <div class="site-title-sub">Bhakthi Channel</div>
    <div class="sub-title-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam Name (e.g. Samasam 1)...">
</div>

<div class="container" id="postsContainer">
    </div>

<div class="nav-section">
    <p style="font-weight: 700; color: var(--primary); margin-bottom: 15px;">SELECT DASHAKAM</p>
    <div class="scroll-container" id="dashButtons"></div>
</div>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel<br>
    <small>Spiritual Wisdom for Daily Living</small>
</footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;

    // Load Data
    fetch("./data/posts.json?v=" + Date.now())
        .then(res => res.json())
        .then(data => {
            allPosts = data;
            renderPage();
            setupDashNav();
        });

    function renderPage(searchTerm = "") {
        const container = document.getElementById("postsContainer");
        container.innerHTML = "";

        let filtered;
        
        if(searchTerm) {
            filtered = allPosts.filter(p => p.title.toLowerCase().includes(searchTerm.toLowerCase()));
        } else {
            // Filter by Dashakam and sort by Samasam number
            filtered = allPosts.filter(p => parseInt(p.dashakam) === currentDashakam)
                .sort((a, b) => {
                    const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                    const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                    return numA - numB;
                });
        }

        // COMING SOON LOGIC
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h3>🙏 Coming Soon</h3>
                    <p>Lyrics for Dashakam ${currentDashakam} are currently being prepared.<br>Please check back later.</p>
                </div>`;
            return;
        }

        filtered.forEach(post => {
            // Extract Samasam number for badge if available
            const samasamNum = post.url.match(/samasam-(\d+)/)?.[1] || "";
            
            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                ${samasamNum ? `<span class="samasam-badge">SAMASAM ${samasamNum}</span>` : ''}
                <h2><a href="./${post.url}/">${post.title}</a></h2>
                <div class="post-meta-desc">${post.description.substring(0, 160)}...</div>
                <a href="./${post.url}/" class="read-link">VIEW TELUGU LYRICS →</a>
            `;
            container.appendChild(card);
        });
    }

    function setupDashNav() {
        const wrapper = document.getElementById("dashButtons");
        wrapper.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const btn = document.createElement("button");
            btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");
            btn.innerText = "Dashakam " + i;
            btn.onclick = () => {
                currentDashakam = i;
                document.getElementById("postSearch").value = ""; // Clear search when switching dashakam
                document.querySelectorAll('.dash-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                window.scrollTo({top: 200, behavior: 'smooth'});
                renderPage();
            };
            wrapper.appendChild(btn);
        }
    }

    // Search Logic
    document.getElementById("postSearch").addEventListener("input", (e) => {
        renderPage(e.target.value.trim());
    });
</script>

</body>
</html>
