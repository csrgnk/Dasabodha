<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official Telugu Lyrics for Dasabodha Grantha by Namo Narayanaya Bhakthi Channel. Explore all 20 Dashakams.">
    
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>

    <link rel="preload" href="./data/posts.json" as="fetch" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" media="print" onload="this.media='all'">

    <style>
        :root {
            --primary: #3FA3A1;
            --secondary: #1A1A1A;
            --accent: #F4D03F;
            --bg: #F4FBFB;
            --top-links-bg: #145A5A;
            --outer-links-bg: #3FA3A1;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #222; }

        /* 📱 FIXED TOP CONTAINER */
        .sticky-wrapper {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* ↔️ HORIZONTAL SCROLLING MENUS (Strict No-Wrap) */
        .top-links, .outer-links {
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap;
            gap: 15px; 
            padding: 10px; 
            scrollbar-width: none; /* Firefox */
            -webkit-overflow-scrolling: touch;
        }
        .top-links::-webkit-scrollbar, .outer-links::-webkit-scrollbar { display: none; }

        .top-links { background: var(--top-links-bg); }
        .outer-links { background: var(--outer-links-bg); }

        .sticky-wrapper a {
            color: #fff; 
            text-decoration: none; 
            font-size: 0.9rem;
            font-weight: 700; 
            padding: 6px 8px; 
            flex-shrink: 0; /* Prevents squeezing */
        }

        /* HEADER */
        header { background: #fff; padding: 10px 8px; border-bottom: 3px solid var(--accent); }
        .header-flex { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header-logo { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .header-text { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .site-title-main { font-family: 'Crimson Text', serif; font-size: 1.25rem; color: #E91E63; margin: 0; }
        .site-title-sub { margin-top: 2px; background: #f0f0f0; padding: 2px 10px; border-radius: 20px; font-size: 0.85rem; color: #333; }

        /* SEARCH */
        .search-area { width: 90%; max-width: 280px; margin: 12px auto; padding-bottom: 5px; }
        #postSearch { 
            width: 100%; padding: 10px; border-radius: 25px; border: 1px solid #ccc; 
            text-align: center; font-size: 16px; 
        }
        #postSearch::placeholder { color: #555; }

        /* CONTENT */
        .container { max-width: 700px; margin: 15px auto; padding: 0 15px; }
        .post-card { 
            background: #fff; border-radius: 8px; padding: 18px; margin-bottom: 15px; 
            border-left: 5px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .post-title-click { margin: 0 0 8px; font-size: 1.3rem; cursor: pointer; color: var(--secondary); }

        /* DASHAKAM NAV (Horizontal Scroll) */
        .nav-section { text-align: center; padding: 20px 0; background: #fff; margin-top: 20px; }
        .scroll-container { 
            display: flex; 
            overflow-x: auto; 
            white-space: nowrap;
            gap: 10px; 
            padding: 10px; 
            scrollbar-width: thin; 
        }
        .dash-btn { 
            min-width: 95px; padding: 10px; border-radius: 20px; background: #fff; 
            cursor: pointer; border: 1px solid #ddd; font-weight: 700; flex-shrink: 0;
        }
        .dash-btn.active { background: var(--secondary); color: var(--accent); border-color: var(--secondary); }

        footer { background: #145A5A; color: #fff; text-align: center; padding: 20px; margin-top: 30px; }
    </style>
</head>

<body>

<div class="sticky-wrapper">
    <div class="top-links">
        <a href="/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
        <a href="/privacy-policy">Privacy Policy</a>
    </div>

    <div class="outer-links">
        <a href="https://csrgnk.github.io/Omnnbc/" rel="noopener">Main Site</a>
        <a href="https://csrgnk.github.io/Upasana-Chandrika/" rel="noopener">Upasana Chandrika</a>
        <a href="https://csrgnk.github.io/manache-shlok/" rel="noopener">Manache Shlok Telugu</a>
        <a href="https://csrgnk.github.io/manache-shlok/hindi/" rel="noopener">Manache Shlok Hindi</a>
    </div>

    <header>
        <div class="header-flex">
            <img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png" 
                 class="header-logo" alt="Logo" width="45" height="45">
            <div class="header-text">
                <div class="site-title-main">Namo Narayanaya Bhakthi Channel</div>
                <div class="site-title-sub">Dasabodha Grantha Telugu Lyrics</div>
            </div>
        </div>
    </header>

    <div class="search-area">
        <input type="text" id="postSearch" placeholder="Search Samasam Name..." aria-label="Search">
    </div>
</div>

<main class="container" id="postsContainer">
    </main>

<nav class="nav-section">
    <p><b>SELECT DASHAKAM</b></p>
    <div class="scroll-container" id="dashButtons"></div>
</nav>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>
let allPosts = [];
let currentDashakam = 1;
let searchTimeout = null;

document.addEventListener("DOMContentLoaded", () => {
    fetch("./data/posts.json?v=" + Date.now(), { priority: 'high' })
    .then(res => res.json())
    .then(data => {
        allPosts = data;
        renderPage();
        setupDashNav();
    });
});

function openPost(url){
    window.location.href = "./" + url + "/";
}

function renderPage(searchTerm = "") {
    const container = document.getElementById("postsContainer");
    container.innerHTML = "";

    let filtered;
    if (searchTerm) {
        filtered = allPosts.filter(p => p.title.toLowerCase().includes(searchTerm.toLowerCase()));
    } else {
        filtered = allPosts.filter(p => parseInt(p.dashakam) === currentDashakam)
            .sort((a, b) => {
                const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                return numA - numB;
            });
    }

    if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:40px;">🙏 Loading Posts...</div>`;
        return;
    }

    const fragment = document.createDocumentFragment();
    filtered.forEach(post => {
        const card = document.createElement("article");
        card.className = "post-card";
        card.innerHTML = `
            <h2 class="post-title-click" onclick="openPost('${post.url}')">${post.title}</h2>
            <p>${post.description.substring(0,120)}...</p>
        `;
        fragment.appendChild(card);
    });
    container.appendChild(fragment);
}

function setupDashNav(){
    const wrap = document.getElementById("dashButtons");
    for(let i=1;i<=20;i++){
        const btn = document.createElement("button");
        btn.innerText = "Dashakam " + i;
        btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");
        btn.onclick = () => {
            currentDashakam = i;
            document.querySelectorAll(".dash-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("postSearch").value = "";
            renderPage();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        wrap.appendChild(btn);
    }
}

document.getElementById("postSearch").addEventListener("input", e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => renderPage(e.target.value), 300);
});
</script>

</body>
</html>
