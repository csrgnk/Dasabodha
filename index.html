<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #922B21; 
            --secondary: #1C2833; 
            --accent: #D4AC0D; 
            --bg: #F9F7F2; 
            --card: #FFFFFF;
            --nav-bg: #17202A;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--secondary);
            line-height: 1.6;
        }

        /* MULTI-LAYER NAVIGATION */
        .top-nav-wrapper {
            background: var(--nav-bg);
            color: #fff;
            padding: 5px 0;
            border-bottom: 2px solid var(--accent);
        }

        /* Line 1: Static Links */
        .nav-line-1 {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Line 2: Scrollable Links */
        .nav-line-2 {
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 15px;
            gap: 20px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        
        .nav-line-2::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .top-nav-wrapper a {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        .top-nav-wrapper a:hover {
            color: var(--accent);
        }

        /* HEADER - TWO LINE BRANDING */
        header {
            background: #fff;
            padding: 30px 15px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        .site-title-main {
            font-family: 'Crimson Text', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
            line-height: 1.1;
        }

        .site-title-sub {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--secondary);
            margin-top: 5px;
        }

        .sub-title-box {
            background: var(--primary);
            color: #fff;
            padding: 5px 18px;
            border-radius: 4px;
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 15px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* SEARCH AREA - COMPACT */
        .search-area {
            max-width: 320px;
            margin: 20px auto;
            padding: 0 15px;
        }

        #postSearch {
            width: 100%;
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #ccc;
            font-size: 15px;
            outline: none;
            text-align: center;
        }

        /* CONTAINER & CARDS */
        .container {
            max-width: 700px;
            margin: 0 auto 40px;
            padding: 0 15px;
            min-height: 350px;
        }

        .post-card {
            background: var(--card);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #eee;
            border-left: 5px solid var(--primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .post-card h2 {
            margin: 0 0 8px;
            font-family: 'Crimson Text', serif;
            font-size: 1.4rem;
            color: var(--secondary);
        }

        .post-card h2 a { text-decoration: none; color: inherit; }

        .post-meta-desc { font-size: 0.9rem; color: #666; margin-bottom: 12px; }

        .read-link {
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* COMING SOON BOX */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            background: #fff;
            border-radius: 8px;
            border: 2px dashed #ddd;
            margin-top: 20px;
        }

        /* DASHAKAM SCROLLER */
        .nav-section {
            background: #fff;
            padding: 20px 0;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .scroll-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 15px;
            scrollbar-width: none;
        }

        .scroll-container::-webkit-scrollbar { display: none; }

        .dash-btn {
            min-width: 105px;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: #fff;
            font-weight: 600;
            flex-shrink: 0;
            cursor: pointer;
        }

        .dash-btn.active {
            background: var(--secondary);
            color: var(--accent);
            border-color: var(--secondary);
        }

        footer {
            background: var(--primary);
            color: #fff;
            text-align: center;
            padding: 30px 15px;
            font-size: 0.8rem;
        }

        @media (max-width: 480px) {
            .site-title-main { font-size: 1.6rem; }
            .site-title-sub { font-size: 0.85rem; letter-spacing: 2px; }
            .nav-line-1 a { font-size: 0.7rem; margin: 0 5px; }
        }
    </style>
</head>
<body>

<nav class="top-nav-wrapper">
    <div class="nav-line-1">
        <a href="/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
        <a href="/privacy-policy">Privacy Policy</a>
    </div>
    <div class="nav-line-2">
        <a href="https://omnnbc.com" target="_blank">Main Site</a>
        <a href="/upasana-chandrika">Upasana Chandrika</a>
        <a href="/manache-shlok">Manache-Shlok</a>
        <a href="/manache-shlok-hindi">Manache-Shlok Hindi</a>
        </div>
</nav>

<header>
    <div class="site-title-main">Namo Narayanaya</div>
    <div class="site-title-sub">Bhakthi Channel</div>
    <div class="sub-title-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam Name...">
</div>

<div class="container" id="postsContainer"></div>

<div class="nav-section">
    <p style="font-weight: bold; color: var(--primary); margin-bottom: 5px; font-size: 0.9rem;">Select Dashakam</p>
    <div class="scroll-container" id="dashButtons"></div>
</div>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel<br>
    <small>Sharing Spiritual Wisdom</small>
</footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;

    fetch("./data/posts.json?v=" + Date.now())
        .then(res => res.json())
        .then(data => {
            allPosts = data;
            renderPage();
            setupDashNav();
        })
        .catch(() => {
            document.getElementById("postsContainer").innerHTML = '<div class="empty-state">Unable to load data.</div>';
        });

    function renderPage(searchTerm = "") {
        const container = document.getElementById("postsContainer");
        container.innerHTML = "";

        let filtered;
        if(searchTerm) {
            filtered = allPosts.filter(p => p.title.toLowerCase().includes(searchTerm.toLowerCase()));
        } else {
            filtered = allPosts.filter(p => parseInt(p.dashakam) === currentDashakam)
                .sort((a, b) => {
                    const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                    const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                    return numA - numB;
                });
        }

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <h3>🙏 Coming Soon</h3>
                    <p>Lyrics for Dashakam ${currentDashakam} are being updated.<br>Check back soon.</p>
                </div>`;
            return;
        }

        filtered.forEach(post => {
            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <h2><a href="./${post.url}/">${post.title}</a></h2>
                <div class="post-meta-desc">${post.description.substring(0, 150)}...</div>
                <a href="./${post.url}/" class="read-link">READ LYRICS →</a>
            `;
            container.appendChild(card);
        });
    }

    function setupDashNav() {
        const wrapper = document.getElementById("dashButtons");
        wrapper.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const btn = document.createElement("button");
            btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");
            btn.innerText = "Dashakam " + i;
            btn.onclick = () => {
                currentDashakam = i;
                document.getElementById("postSearch").value = "";
                document.querySelectorAll('.dash-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                window.scrollTo({top: 0, behavior: 'smooth'});
                renderPage();
            };
            wrapper.appendChild(btn);
        }
    }

    document.getElementById("postSearch").addEventListener("input", (e) => {
        renderPage(e.target.value.trim());
    });
</script>

</body>
</html>
