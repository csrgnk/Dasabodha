<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>
    <style>
        /* [Insert your existing CSS here from previous messages] */
        :root { --primary: #3FA3A1; --bg: #F4FBFB; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; }
        .container { max-width: 700px; margin: auto; padding: 15px; }
        .post-card { background: #fff; border-radius: 8px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--primary); cursor: pointer; }
        .dash-btn { padding: 10px; margin: 5px; border-radius: 20px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: bold; }
        .dash-btn.active { background: #1A1A1A; color: #F4D03F; }
        .scroll-container { display: flex; overflow-x: auto; gap: 10px; padding: 10px; }
    </style>
</head>
<body>

<header style="text-align:center; padding:20px; background:#fff; border-bottom:3px solid #F4D03F;">
    <h1>Namo Narayanaya</h1>
    <p>Dasabodha Grantha Telugu Lyrics</p>
</header>

<div class="container">
    <div style="text-align:center; margin: 20px 0;">
        <input type="text" id="postSearch" placeholder="Search Samasam..." style="width:80%; padding:10px; border-radius:25px; border:1px solid #ccc;">
    </div>

    <main id="postsContainer">
        <div style="text-align:center;padding:40px;">🙏 Loading...</div>
    </main>
</div>

<nav style="text-align:center; padding: 20px; background:#fff;">
    <p><b>SELECT DASHAKAM</b></p>
    <div class="scroll-container" id="dashButtons"></div>
</nav>

<script>
let allPosts = [];
let currentDashakam = 1;
let searchTimeout = null;

document.addEventListener("DOMContentLoaded", () => {
    // Fetching data from the same domain
    fetch("./data/posts.json?v=" + new Date().getTime())
    .then(res => res.json())
    .then(data => {
        allPosts = data;
        // Logic to extract Dashakam and Samasam numbers from URL
        allPosts.forEach(p => {
            let d = p.url.match(/dashakam-(\d+)/i);
            let s = p.url.match(/samasam-(\d+)/i);
            if (d) p.dashakam = parseInt(d[1]);
            if (s) p.samasam = parseInt(s[1]);
        });
        renderPage();
        setupDashNav();
    })
    .catch(err => {
        console.error("Error:", err);
        document.getElementById("postsContainer").innerHTML = "Error loading content.";
    });
});

function openPost(url){
    // CLEAN URL: Redirects to /dashakam-1-samasam-1/ instead of .html
    window.location.href = window.location.origin + "/" + url + "/";
}

function renderPage(searchTerm = "") {
    const container = document.getElementById("postsContainer");
    let filtered = searchTerm 
        ? allPosts.filter(p => p.title.toLowerCase().includes(searchTerm.toLowerCase()))
        : allPosts.filter(p => p.dashakam === currentDashakam).sort((a, b) => a.samasam - b.samasam);

    if (filtered.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:40px;">ఈ దశకంలో సమాసాలు త్వరలో వస్తాయి...</div>`;
        return;
    }

    container.innerHTML = "";
    filtered.forEach(post => {
        const card = document.createElement("article");
        card.className = "post-card";
        card.onclick = () => openPost(post.url);
        card.innerHTML = `
            <h2 style="margin:0; font-size:1.2rem;">${post.title}</h2>
            <p style="color:#666; font-size:0.9rem;">${post.description || "దాసబోధ తెలుగు వివరణ..."}</p>
        `;
        container.appendChild(card);
    });
}

function setupDashNav(){
    const wrap = document.getElementById("dashButtons");
    for(let i=1; i<=20; i++){
        const btn = document.createElement("button");
        btn.innerText = "దశకం " + i;
        btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");
        btn.onclick = () => {
            currentDashakam = i;
            document.querySelectorAll(".dash-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("postSearch").value = "";
            renderPage();
            window.scrollTo({top: 0, behavior: 'smooth'});
        };
        wrap.appendChild(btn);
    }
}

document.getElementById("postSearch").addEventListener("input", e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => renderPage(e.target.value), 300);
});
</script>
</body>
</html>
