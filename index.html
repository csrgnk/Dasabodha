<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #3FA3A1;
    --secondary: #1A1A1A;
    --accent: #F4D03F;
    --bg: #F4FBFB;

    --top-links-bg: #145A5A;
    --outer-links-bg: #3FA3A1;
}

/* BODY */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
}

/* =========================
   🔵 NAV (NON-STICKY)
========================= */
.fixed-nav-wrapper{
    position: relative;
}

/* BOTH MENU LINES */
.top-links,
.outer-links{
    display:flex;
    overflow-x:auto;
    white-space:nowrap;
    gap:15px;
    padding:10px;
    scrollbar-width:none;
}

.top-links{ background: var(--top-links-bg); }
.outer-links{ background: var(--outer-links-bg); }

.top-links::-webkit-scrollbar,
.outer-links::-webkit-scrollbar{
    display:none;
}

/* LINKS */
.fixed-nav-wrapper a{
    color:#fff;
    text-decoration:none;
    font-size:0.9rem;
    font-weight:700;
    padding:6px 8px;
    flex-shrink:0;
    white-space:nowrap;
}

/* =========================
   🔶 HEADER
========================= */
header {
    background:#fff;
    padding:10px 8px;
    border-bottom:3px solid var(--accent);
}

.header-flex {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.header-logo {
    width:50px;
    height:50px;
    border-radius:50%;
}

.header-text {
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
}

.site-title-main {
    font-family:'Crimson Text', serif;
    font-size:1.3rem;
    color:#E91E63;
    margin:0;
}

.site-title-sub {
    margin-top:3px;
    background:#fff;
    padding:4px 10px;
    border-radius:20px;
    font-size:0.9rem;
}

/* =========================
   🔍 SEARCH
========================= */
.search-area {
    width:90%;
    max-width:260px;
    margin:20px auto;
}

#postSearch {
    width:100%;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    text-align:center;
}

/* =========================
   📄 POSTS
========================= */
.container {
    max-width:700px;
    margin:auto;
    padding:0 15px;
}

.post-card {
    background:#fff;
    border-radius:8px;
    padding:18px;
    margin-bottom:15px;
    border-left:5px solid var(--primary);
}

.post-title-click {
    margin:0 0 8px;
    font-size:1.35rem;
    cursor:pointer;
}

.post-title-click:hover {
    color: var(--primary);
}

/* =========================
   🔘 DASHAKAM NAV
========================= */
.nav-section {
    text-align:center;
    padding:20px 0;
}

.scroll-container {
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
}

.dash-btn {
    min-width:95px;
    padding:10px;
    border-radius:20px;
    background:#fff;
    cursor:pointer;
}

.dash-btn.active {
    background: var(--secondary);
    color: var(--accent);
}

/* =========================
   🔻 FOOTER
========================= */
footer {
    background:#2E8B87;
    color:#fff;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<!-- 🔵 MENU -->
<div class="fixed-nav-wrapper">

    <!-- LINE 1 -->
    <div class="top-links">
        <a href="/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
        <a href="/privacy-policy">Privacy Policy</a>
    </div>

    <!-- LINE 2 -->
    <div class="outer-links">
        <a href="https://csrgnk.github.io/Omnnbc/">Main Site</a>
        <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
        <a href="https://csrgnk.github.io/manache-shlok/">Manache Shlok Telugu</a>
        <a href="https://csrgnk.github.io/manache-shlok/hindi/">Manache Shlok Hindi</a>
    </div>

</div>

<!-- 🔶 HEADER -->
<header>
    <div class="header-flex">
        <img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png" class="header-logo">

        <div class="header-text">
            <div class="site-title-main">Namo Narayanaya Bhakthi Channel</div>
            <div class="site-title-sub">Dasabodha Grantha Telugu Lyrics</div>
        </div>
    </div>
</header>

<!-- 🔍 SEARCH -->
<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam Name...">
</div>

<!-- 📄 POSTS -->
<div class="container" id="postsContainer"></div>

<!-- 🔘 DASHAKAM -->
<div class="nav-section">
    <p><b>SELECT DASHAKAM</b></p>
    <div class="scroll-container" id="dashButtons"></div>
</div>

<!-- 🔻 FOOTER -->
<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<!-- ⚙️ SCRIPT -->
<script>
let allPosts = [];
let currentDashakam = 1;

// Load posts
fetch("./data/posts.json?v=" + Date.now())
.then(res => res.json())
.then(data => {
    allPosts = data;
    renderPage();
    setupDashNav();
});

// Open post
function openPost(url){
    window.location.href = "./" + url + "/";
}

// Render posts
function renderPage(searchTerm = "") {
    const container = document.getElementById("postsContainer");
    container.innerHTML = "";

    let filtered;

    if (searchTerm) {
        filtered = allPosts.filter(p =>
            p.title.toLowerCase().includes(searchTerm.toLowerCase())
        );
    } else {
        filtered = allPosts
            .filter(p => parseInt(p.dashakam) === currentDashakam)
            .sort((a, b) => {
                const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                return numA - numB;
            });
    }

    // No posts
    if (filtered.length === 0) {
        container.innerHTML = `
            <div style="text-align:center;padding:30px;background:#fff;border-radius:10px;">
                <h3 style="color:var(--primary);">🙏 Coming Soon</h3>
                <p>Dashakam ${currentDashakam} posts are coming soon.</p>
            </div>`;
        return;
    }

    // Show posts
    filtered.forEach(post => {
        const card = document.createElement("div");
        card.className = "post-card";

        card.innerHTML = `
            <h2 class="post-title-click" onclick="openPost('${post.url}')">
                ${post.title}
            </h2>
            <div>${post.description.substring(0,120)}...</div>
        `;

        container.appendChild(card);
    });
}

// Dashakam buttons
function setupDashNav(){
    const wrap = document.getElementById("dashButtons");

    for(let i=1;i<=20;i++){
        const btn = document.createElement("button");

        btn.innerText = "Dashakam " + i;
        btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");

        btn.onclick = () => {
            currentDashakam = i;

            document.querySelectorAll(".dash-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");

            document.getElementById("postSearch").value = "";
            renderPage();
        };

        wrap.appendChild(btn);
    }
}

// Search
document.getElementById("postSearch").addEventListener("input", e => {
    renderPage(e.target.value);
});
</script>

</body>
</html>
