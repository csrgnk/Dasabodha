<body>

<nav class="nav-wrapper">
    <div class="nav-row">
        <a href="/">HOME</a>
        <a href="/about-us">ABOUT</a>
        <a href="/contact-us">CONTACT</a>
        <a href="https://omnnbc.com" target="_blank">MAIN SITE</a>
    </div>
</nav>

<header>
    <div class="header-container">
        <img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="logo">
        <h1 class="site-title-main">
            <span class="line-1">NAMO NARAYANAYA</span>
            <span class="line-2">BHAKTHI CHANNEL</span>
        </h1>
    </div>
    <div class="site-title-sub">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam...">
</div>

<main class="container" id="postsContainer">
    <div style="text-align:center;padding:40px;">Loading...</div>
</main>

<nav class="nav-section">
    <div id="dashButtons"></div>
</nav>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>
let allPosts = [];
let currentDashakam = 1;

fetch("/data/posts.json?v=" + Date.now())
.then(res => res.json())
.then(data => {
    allPosts = data;
    renderPage();
    setupDashNav();
});

function renderPage(search=""){
    const c = document.getElementById("postsContainer");

    let f = search
        ? allPosts.filter(p => p.title.toLowerCase().includes(search.toLowerCase()))
        : allPosts.filter(p => parseInt(p.dashakam) === currentDashakam);

    if(!f.length){
        c.innerHTML = "No results";
        return;
    }

    c.innerHTML = f.map(p => `
        <div class="post-card">
            <a href="/${p.url}/">
                <h2 class="post-title">${p.title}</h2>
                <p class="post-desc">${p.description || ""}</p>
            </a>
        </div>
    `).join("");
}

function setupDashNav(){
    const wrap = document.getElementById("dashButtons");

    for(let i=1;i<=20;i++){
        const b = document.createElement("button");
        b.innerText = i;
        b.className = "dash-circle";
        b.onclick = () => {
            currentDashakam = i;
            renderPage();
        };
        wrap.appendChild(b);
    }
}

document.getElementById("postSearch").addEventListener("input", e=>{
    renderPage(e.target.value);
});
</script>

</body>
