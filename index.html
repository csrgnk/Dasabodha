<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>
    <style>
        :root {
            --primary: #C2185B;
            --secondary: #002366;
            --accent: #FFD700;
            --bg: #f4f6f9;
            --card-yellow: #FFFDE7; 
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: var(--bg);
            color: #333;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* HEADER - Scrolling (Not Sticky), Two Lines, Light Yellow */
        header {
            background: var(--card-yellow);
            padding: 25px 10px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            /* Removed sticky setup so it scrolls with page */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .site-title-main {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
            margin: 0;
        }

        .site-title-sub {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1.2;
            margin: 2px 0 0 0;
        }

        .sub-title-box {
            background: var(--secondary);
            color: #fff;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* SEARCH CONTAINER */
        .search-container {
            padding: 15px;
            background: #fff;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #eee;
        }

        #postSearch {
            width: 100%;
            max-width: 320px;
            padding: 12px;
            font-size: 16px; 
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            text-align: center;
        }

        /* POST CARDS */
        .container {
            max-width: 700px;
            margin: auto;
            padding: 15px;
            min-height: 50vh;
        }

        .post-card {
            background: var(--card-yellow);
            padding: 22px;
            margin-bottom: 15px;
            border-radius: 12px;
            border-left: 6px solid var(--primary);
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
        }

        .post-card h2 {
            margin: 0 0 10px;
            font-size: 1.3rem;
            color: var(--secondary);
            line-height: 1.4;
        }

        .post-card h2 a {
            text-decoration: none;
            color: inherit;
        }

        .post-meta-desc {
            color: #555;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .read-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            border: 1px solid var(--primary);
            padding: 8px 18px;
            border-radius: 5px;
            background: #fff;
        }

        /* PAGINATION */
        .pagination-wrapper {
            background: #fff;
            padding: 25px 0;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .page-numbers-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 15px;
            scrollbar-width: none;
        }

        .page-numbers-container::-webkit-scrollbar { display: none; }

        .pg-btn {
            min-width: 110px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 30px;
            background: white;
            color: var(--secondary);
            font-weight: 600;
            flex-shrink: 0;
            cursor: pointer;
        }

        .pg-btn.active {
            background: var(--secondary);
            color: var(--accent);
            border-color: var(--secondary);
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 30px 15px;
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .site-title-main, .site-title-sub { font-size: 1.45rem; }
            .post-card h2 { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="site-title-main">Namo Narayanaya</div>
    <div class="site-title-sub">Bhakthi Channel</div>
    <div class="sub-title-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-container">
    <input type="text" id="postSearch" placeholder="Search Samasam Name...">
</div>

<div class="container" id="postsContainer">
    <div style="text-align:center; padding:50px;">Loading Content...</div>
</div>

<div class="pagination-wrapper">
    <p style="font-weight:bold; color:var(--primary); margin-bottom:10px;">Select Dashakam</p>
    <div class="page-numbers-container" id="paginationWrapper"></div>
</div>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel<br>
    <small>Sharing Spiritual Wisdom</small>
</footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;

    fetch("./data/posts.json?v=" + Date.now())
        .then(res => res.json())
        .then(data => {
            allPosts = data.sort((a, b) => {
                if (parseInt(a.dashakam) !== parseInt(b.dashakam)) {
                    return parseInt(a.dashakam) - parseInt(b.dashakam);
                }
                const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                return numA - numB;
            });
            renderPage();
        });

    function renderPage() {
        const container = document.getElementById("postsContainer");
        container.innerHTML = "";
        const posts = allPosts.filter(p => parseInt(p.dashakam) === currentDashakam);

        if (posts.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:50px; color:#999;">Lyrics coming soon.</div>`;
            setupPagination();
            return;
        }

        posts.forEach(post => {
            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <h2><a href="./${post.url}/">${post.title}</a></h2>
                <div class="post-meta-desc">${post.description || "Read Telugu lyrics."}</div>
                <a href="./${post.url}/" class="read-link">READ LYRICS →</a>
            `;
            container.appendChild(card);
        });
        setupPagination();
    }

    function setupPagination() {
        const wrapper = document.getElementById("paginationWrapper");
        wrapper.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const btn = document.createElement("button");
            btn.className = "pg-btn" + (i === currentDashakam ? " active" : "");
            btn.innerText = "Dashakam " + i;
            btn.onclick = () => {
                currentDashakam = i;
                window.scrollTo({top: 0, behavior: 'smooth'});
                renderPage();
            };
            wrapper.appendChild(btn);
        }
        const activeBtn = wrapper.querySelector('.active');
        if(activeBtn) {
            wrapper.scrollTo({ left: activeBtn.offsetLeft - 40, behavior: 'smooth' });
        }
    }

    document.getElementById("postSearch").addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase().trim();
        const container = document.getElementById("postsContainer");
        if (term === "") { renderPage(); return; }

        const filtered = allPosts.filter(p => p.title.toLowerCase().includes(term));
        container.innerHTML = "";
        filtered.forEach(post => {
            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <h2><a href="./${post.url}/">${post.title}</a></h2>
                <div class="post-meta-desc">${post.description || ""}</div>
                <a href="./${post.url}/" class="read-link">READ LYRICS →</a>
            `;
            container.appendChild(card);
        });
    });
</script>

</body>
</html>
