<!DOCTYPE html>
<html lang="te">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dasabodha Grantha Telugu Lyrics</title>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:#f4f6f9;
}

/* HEADER */

header{
background:#fff9db;
padding:20px 10px;
text-align:center;
border-bottom:3px solid #FFD700;
}

.site-title{
font-size:1.6rem;
font-weight:bold;
color:#C2185B;
}

.sub-title-box{
background:linear-gradient(135deg,#002366,#0047AB);
color:#ffffff;
padding:8px 20px;
border-radius:50px;
font-size:0.95rem;
display:inline-block;
margin-top:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* SEARCH (UPDATED) */

.search-container{
max-width:800px;
margin:15px auto;
display:flex;
justify-content:center;
padding:0 10px;
box-sizing:border-box;
}

#postSearch{
width:100%;
max-width:420px;   /* smaller width */
padding:10px 16px;
font-size:15px;
border:2px solid #C2185B;
border-radius:30px;
outline:none;
text-align:center;
box-sizing:border-box;
}

/* POSTS */

.container{
max-width:800px;
margin:auto;
padding:15px;
box-sizing:border-box;
}

.post-card{
background:#FFFDE7;
padding:20px;
margin-bottom:15px;
border-radius:12px;
border-left:6px solid #C2185B;
}

.post-card h2{
margin:0 0 8px;
color:#002366;
}

.post-meta-desc{
color:#555;
font-size:14px;
margin:8px 0;
}

/* COMING SOON */

.coming-soon{
text-align:center;
padding:40px 15px;
font-size:16px;
color:#C2185B;
font-weight:bold;
}

/* DASHakam Pagination */

.pagination-wrapper{
display:flex;
flex-direction:column;
align-items:center;
margin:30px 0;
}

.page-numbers-container{
display:flex;
gap:10px;
overflow-x:auto;
white-space:nowrap;
width:100%;
padding:10px;
scrollbar-width:none;
}

.page-numbers-container::-webkit-scrollbar{
display:none;
}

.pg-btn{
min-width:120px;
padding:8px 12px;
border:2px solid #002366;
border-radius:25px;
background:white;
color:#002366;
font-weight:bold;
cursor:pointer;
flex-shrink:0;
}

.pg-btn.active{
background:#002366;
color:#FFD700;
}

/* FOOTER */

footer{
background:#C2185B;
color:white;
text-align:center;
padding:20px;
}

/* MOBILE FIX */

@media(max-width:500px){

#postSearch{
max-width:100%;
font-size:14px;
padding:9px 14px;
}

.post-card{
padding:15px;
}

}

</style>

</head>

<body>

<header>
<div class="site-title">Namo Narayanaya Bhakthi Channel</div>
<div class="sub-title-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-container">
<input type="text" id="postSearch" placeholder="Search Dashakam or Samasam...">
</div>

<div class="container" id="postsContainer">
Loading posts...
</div>

<div class="pagination-wrapper">

<p style="font-weight:bold;color:#C2185B;">Select Dashakam</p>

<div class="page-numbers-container" id="paginationWrapper"></div>

</div>

<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>

let allPosts=[];
let currentDashakam=1;

fetch("./data/posts.json?v="+Date.now())
.then(res=>res.json())
.then(data=>{

allPosts=data.sort((a,b)=>{

if(parseInt(a.dashakam)!==parseInt(b.dashakam)){
return parseInt(a.dashakam)-parseInt(b.dashakam);
}

const numA=parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
const numB=parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);

return numA-numB;

});

renderPage();

});

/* RENDER POSTS */

function renderPage(){

const container=document.getElementById("postsContainer");
container.innerHTML="";

const posts=allPosts.filter(p=>parseInt(p.dashakam)===currentDashakam);

if(posts.length===0){

container.innerHTML=`
<div class="coming-soon">
Posts are coming soon for Dashakam ${currentDashakam}
</div>
`;

setupPagination();
return;

}

posts.forEach(post=>{

const card=document.createElement("div");

card.className="post-card";

card.innerHTML=`

<h2>
<a href="./${post.url}/" style="text-decoration:none;color:#002366;">
${post.title}
</a>
</h2>

<div class="post-meta-desc">
${post.description || ""}
</div>

<a href="./${post.url}/" style="color:#C2185B;font-weight:bold;">
READ LYRICS →
</a>

`;

container.appendChild(card);

});

setupPagination();

}

/* PAGINATION */

function setupPagination(){

const wrapper=document.getElementById("paginationWrapper");
wrapper.innerHTML="";

for(let i=1;i<=20;i++){

const btn=document.createElement("button");

btn.className="pg-btn"+(i===currentDashakam?" active":"");

btn.innerText="Dashakam "+i;

btn.onclick=()=>{
currentDashakam=i;
renderPage();
};

wrapper.appendChild(btn);

}

}

/* SEARCH */

document.getElementById("postSearch").addEventListener("input",(e)=>{

const term=e.target.value.toLowerCase();

if(term===""){
renderPage();
return;
}

const container=document.getElementById("postsContainer");
container.innerHTML="";

const filtered=allPosts.filter(p=>p.title.toLowerCase().includes(term));

filtered.forEach(post=>{

const card=document.createElement("div");

card.className="post-card";

card.innerHTML=`

<h2>
<a href="./${post.url}/">
${post.title}
</a>
</h2>

<p>${post.description || ""}</p>

`;

container.appendChild(card);

});

});

</script>

</body>
</html>
