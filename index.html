<!DOCTYPE html>
<html lang="te">
<head>
    <script type="text/javascript">
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['c', 'u', 's', 'a', 'p'].includes(e.key)) e.preventDefault();
        });
        document.onselectstart = () => false;
    </script>
    <style> body { -webkit-user-select: none; user-select: none; } </style>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasabodha Telugu Lyrics | Namo Narayanaya</title>
    <link rel="icon" type="image/png" href="https://omnnbc.com/assets/images/Omnnbc-new.png">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary: #3FA3A1; --nav-bg: #145A5A; --site-pink: #E91E63; --accent: #F4D03F; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: #F4FBFB; }
        
        /* ↔️ Nav Menus */
        .fixed-nav-wrapper { position: sticky; top: 0; z-index: 1000; }
        .top-links, .outer-links { display: flex; overflow-x: auto; gap: 15px; padding: 12px; scrollbar-width: none; }
        .top-links::-webkit-scrollbar, .outer-links::-webkit-scrollbar { display: none; }
        .top-links { background: var(--nav-bg); }
        .outer-links { background: var(--primary); }
        .fixed-nav-wrapper a { color: #fff; text-decoration: none; font-size: 0.85rem; font-weight: 700; white-space: nowrap; }

        /* 🏛️ Header - Mobile: 2 Lines | Desktop: 1 Line */
        header { background: #fff; padding: 25px 10px; border-bottom: 3px solid var(--accent); text-align: center; }
        .header-container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .logo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--site-pink); }
        .site-title { color: var(--site-pink); font-family: 'Crimson Text', serif; margin: 0; }
        .line-1 { font-size: 1.6rem; display: block; font-weight: 700; }
        .line-2 { font-size: 1.2rem; display: block; font-weight: 600; }

        @media (min-width: 768px) {
            .header-container { flex-direction: row; gap: 20px; }
            .line-1, .line-2 { display: inline-block; font-size: 2.2rem; }
            .line-2 { margin-left: 15px; }
        }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; min-height: 400px; }
        .post-card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 15px; border-left: 6px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .post-title { margin: 0; color: var(--primary); font-size: 1.4rem; }
        
        .dash-nav { text-align: center; margin: 30px 0; background: #fff; padding: 20px; }
        .dash-btn { padding: 10px 20px; margin: 5px; border-radius: 25px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-weight: bold; }
        .dash-btn.active { background: var(--nav-bg); color: #fff; }
        
        footer { background: var(--nav-bg); color: #fff; text-align: center; padding: 30px; margin-top: 50px; }
    </style>
</head>
<body>

<div class="fixed-nav-wrapper">
    <div class="top-links">
        <a href="/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
    </div>
    <div class="outer-links">
        <a href="https://omnnbc.com" target="_blank">Main Site</a>
        <a href="https://upasana-chandrika.omnnbc.in/" target="_blank">Upasana Chandrika</a>
    </div>
</div>

<header>
    <div class="header-container">
        <img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="logo" alt="Logo">
        <h1 class="site-title">
            <span class="line-1">NAMO NARAYANAYA</span>
            <span class="line-2">BHAKTHI CHANNEL</span>
        </h1>
    </div>
</header>

<main class="container" id="mainDisplay">
    <div style="text-align:center; padding:50px;">🙏 Loading...</div>
</main>

<div class="dash-nav" id="dashButtons"></div>

<footer>© 2026 Namo Narayanaya Bhakthi Channel</footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const slug = pathParts[pathParts.length - 1] || "index";

    async function init() {
        try {
            // Absolute path "/" is mandatory for Clean URLs
            const res = await fetch("/data/posts.json?v=" + Date.now());
            allPosts = await res.json();
            
            if (slug === "index") {
                renderHome();
                renderDashButtons();
            } else {
                renderPost(slug);
            }
        } catch (e) { document.getElementById("mainDisplay").innerHTML = "Error loading data."; }
    }

    function renderHome() {
        const filtered = allPosts.filter(p => parseInt(p.dashakam) === currentDashakam);
        // Sorting Samasams numerically
        filtered.sort((a, b) => {
            const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
            const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
            return numA - numB;
        });

        document.getElementById("mainDisplay").innerHTML = filtered.map(p => `
            <div class="post-card" onclick="location.href='/${p.url}/'">
                <h2 class="post-title">${p.title}</h2>
                <p>${p.description.substring(0, 120)}...</p>
            </div>
        `).join('');
    }

    async function renderPost(slugName) {
        const post = allPosts.find(p => p.url === slugName);
        if (post) {
            try {
                const res = await fetch(`/posts/${post.url}.html`);
                const html = await res.text();
                document.getElementById("mainDisplay").innerHTML = `<div style="background:#fff; padding:25px; border-radius:10px;">${html}</div>`;
                document.title = post.title + " | Namo Narayanaya";
                document.getElementById("dashButtons").style.display = 'none';
            } catch (e) { window.location.href = "/404"; }
        } else {
            window.location.href = "/404"; 
        }
    }

    function renderDashButtons() {
        const btnContainer = document.getElementById("dashButtons");
        btnContainer.innerHTML = "<p><b>SELECT DASHAKAM</b></p>";
        for(let i=1; i<=20; i++) {
            const btn = document.createElement("button");
            btn.innerText = "D" + i;
            btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");
            btn.onclick = () => { currentDashakam = i; renderHome(); window.scrollTo({top:0, behavior:'smooth'}); };
            btnContainer.appendChild(btn);
        }
    }

    init();
</script>
</body>
</html>
