<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #3FA3A1;
    --secondary: #1A1A1A;
    --accent: #F4D03F;
    --bg: #F4FBFB;
    --card: #FFFFFF;

    --top-links-bg: #145A5A;
    --outer-links-bg: #3FA3A1;
}

body {
    margin: 0;
    padding-top: 95px;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--secondary);
}

/* NAV */
.fixed-nav-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
}

.top-links {
    background: var(--top-links-bg);
    display: flex;
    overflow-x: auto;
    white-space: nowrap;
    padding: 10px 12px;
    gap: 18px;
    scrollbar-width: none;
}
.top-links::-webkit-scrollbar { display:none; }

.outer-links {
    background: var(--outer-links-bg);
    display: flex;
    overflow-x: auto;
    white-space: nowrap;
    padding: 12px 14px;
    gap: 20px;
    scrollbar-width: none;
}
.outer-links::-webkit-scrollbar { display:none; }

.fixed-nav-wrapper a {
    color: #fff;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 6px 10px;
}

/* HEADER */
header {
    background: #fff;
    padding: 15px 10px;
    border-bottom: 3px solid var(--accent);
}

.header-flex {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.header-logo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

.header-text {
    display: flex;
    flex-direction: column;
}

.site-title-main {
    font-family: 'Crimson Text', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: #E91E63;
    margin: 0;
}

/* 🔥 UPDATED SUBTITLE SIZE */
.site-title-sub {
    margin-top: 4px;
    display: inline-block;
    background: #fff;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--secondary);
}

/* SEARCH */
.search-area {
    width: 90%;
    max-width: 260px;
    margin: 20px auto;
}

#postSearch {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    text-align: center;
}

/* POSTS */
.container {
    max-width: 700px;
    margin: auto;
    padding: 0 15px;
}

.post-card {
    background: #fff;
    border-radius: 8px;
    padding: 18px;
    margin-bottom: 15px;
    border-left: 5px solid var(--primary);
}

.post-card h2 {
    margin: 0 0 8px;
    font-size: 1.35rem;
}

.post-card h2 a {
    text-decoration: none;
    color: inherit;
}

.post-meta-desc {
    font-size: 0.9rem;
}

/* DASH NAV */
.nav-section {
    text-align: center;
    padding: 20px 0;
}

.scroll-container {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
}

.dash-btn {
    min-width: 95px;
    padding: 10px;
    border-radius: 20px;
    background: #fff;
}

.dash-btn.active {
    background: var(--secondary);
    color: var(--accent);
}

/* FOOTER */
footer {
    background: #2E8B87;
    color: #fff;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="fixed-nav-wrapper">
    <div class="top-links">
        <a href="/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
        <a href="/privacy-policy">Privacy Policy</a>
    </div>

    <div class="outer-links">
        <a href="https://csrgnk.github.io/Omnnbc/">Main Site</a>
        <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
        <a href="https://csrgnk.github.io/manache-shlok/">Manache Shlok Telugu</a>
        <a href="https://csrgnk.github.io/manache-shlok/hindi/">Manache Shlok Hindi</a>
    </div>
</div>

<!-- HEADER -->
<header>
    <div class="header-flex">

        <img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png" class="header-logo">

        <div class="header-text">
            <div class="site-title-main">
                Namo Narayanaya Bhakthi Channel
            </div>
            <div class="site-title-sub">
                Dasabodha Grantha Telugu Lyrics
            </div>
        </div>

    </div>
</header>

<!-- SEARCH -->
<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam Name...">
</div>

<!-- POSTS -->
<div class="container" id="postsContainer"></div>

<!-- DASH NAV -->
<div class="nav-section">
    <p style="font-weight:bold;">SELECT DASHAKAM</p>
    <div class="scroll-container" id="dashButtons"></div>
</div>

<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<!-- SCRIPT (UNCHANGED) -->
<script>
let allPosts = [];
let currentDashakam = 1;

fetch("./data/posts.json?v=" + Date.now())
.then(res => res.json())
.then(data => {
    allPosts = data;
    renderPage();
    setupDashNav();
});

function renderPage(searchTerm = "") {
    const container = document.getElementById("postsContainer");
    container.innerHTML = "";

    let filtered;
    if(searchTerm){
        filtered = allPosts.filter(p => p.title.toLowerCase().includes(searchTerm.toLowerCase()));
    } else {
        filtered = allPosts.filter(p => parseInt(p.dashakam) === currentDashakam);
    }

    filtered.forEach(post => {
        const card = document.createElement("div");
        card.className = "post-card";
        card.innerHTML = `
            <h2><a href="./${post.url}/">${post.title}</a></h2>
            <div>${post.description.substring(0,120)}...</div>
        `;
        container.appendChild(card);
    });
}

function setupDashNav(){
    const wrap = document.getElementById("dashButtons");
    for(let i=1;i<=20;i++){
        const btn = document.createElement("button");
        btn.innerText = "Dashakam " + i;
        btn.className = "dash-btn";
        btn.onclick = () => {
            currentDashakam = i;
            renderPage();
        };
        wrap.appendChild(btn);
    }
}

document.getElementById("postSearch").addEventListener("input", e => {
    renderPage(e.target.value);
});
</script>

</body>
</html>
