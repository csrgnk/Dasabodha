<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Official Telugu Lyrics for Dasabodha Grantha by Namo Narayanaya Bhakthi Channel. Explore all 20 Dashakams and Samasams.">
    
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>

    <link rel="preload" href="./data/posts.json" as="fetch" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" media="print" onload="this.media='all'">

    <style>
        :root {
            --primary: #3FA3A1;
            --secondary: #1A1A1A;
            --accent: #F4D03F;
            --bg: #F4FBFB;
            --top-links-bg: #145A5A;
            --outer-links-bg: #3FA3A1;
        }

        /* Base Styles */
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #222; line-height: 1.5; }
        
        /* Nav & Menus */
        .fixed-nav-wrapper { position: relative; }
        .top-links, .outer-links {
            display: flex; overflow-x: auto; white-space: nowrap;
            gap: 15px; padding: 10px; scrollbar-width: none;
        }
        .top-links { background: var(--top-links-bg); }
        .outer-links { background: var(--outer-links-bg); }
        .top-links::-webkit-scrollbar, .outer-links::-webkit-scrollbar { display: none; }
        .fixed-nav-wrapper a {
            color: #fff; text-decoration: none; font-size: 0.95rem;
            font-weight: 700; padding: 8px; flex-shrink: 0;
        }

        /* Header - CLS Fix */
        header { background: #fff; padding: 15px 8px; border-bottom: 3px solid var(--accent); }
        .header-flex { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header-logo { width: 50px; height: 50px; border-radius: 50%; aspect-ratio: 1/1; object-fit: cover; }
        .header-text { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .site-title-main { font-family: 'Crimson Text', serif; font-size: 1.4rem; color: #E91E63; margin: 0; }
        .site-title-sub { margin-top: 5px; background: #eee; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; color: #333; }

        /* Search - Accessibility Fix */
        .search-area { width: 90%; max-width: 280px; margin: 25px auto; }
        #postSearch { 
            width: 100%; padding: 12px; border-radius: 25px; border: 2px solid #ccc; 
            text-align: center; font-size: 16px; transition: border-color 0.3s;
        }
        #postSearch:focus { border-color: var(--primary); outline: none; }
        #postSearch::placeholder { color: #555; opacity: 1; } /* Darker for accessibility */

        /* Posts Section */
        .container { max-width: 700px; margin: auto; padding: 0 15px; min-height: 400px; }
        .post-card { 
            background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 20px; 
            border-left: 6px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .post-title-click { margin: 0 0 10px; font-size: 1.4rem; cursor: pointer; color: var(--secondary); transition: color 0.2s; }
        .post-title-click:hover { color: var(--primary); }

        /* Dashakam Nav */
        .nav-section { text-align: center; padding: 30px 0; }
        .scroll-container { display: flex; overflow-x: auto; gap: 12px; padding: 15px; scrollbar-width: thin; }
        .dash-btn { 
            min-width: 105px; padding: 12px; border-radius: 25px; background: #fff; 
            cursor: pointer; border: 2px solid #ddd; font-weight: 700; transition: all 0.3s;
        }
        .dash-btn.active { background: var(--secondary); color: var(--accent); border-color: var(--secondary); }

        footer { background: #145A5A; color: #fff; text-align: center; padding: 25px; margin-top: 50px; font-size: 0.9rem; }
    </style>
</head>

<body>

<nav class="fixed-nav-wrapper">
    <div class="top-links">
        <a href="/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
        <a href="/privacy-policy">Privacy Policy</a>
    </div>
    <div class="outer-links">
        <a href="https://csrgnk.github.io/Omnnbc/" rel="noopener">Main Site</a>
        <a href="https://csrgnk.github.io/Upasana-Chandrika/" rel="noopener">Upasana Chandrika</a>
        <a href="https://csrgnk.github.io/manache-shlok/" rel="noopener">Manache Shlok Telugu</a>
        <a href="https://csrgnk.github.io/manache-shlok/hindi/" rel="noopener">Manache Shlok Hindi</a>
    </div>
</nav>

<header>
    <div class="header-flex">
        <img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png" 
             class="header-logo" 
             alt="Namo Narayanaya Logo" 
             width="50" height="50" 
             loading="eager">
        <div class="header-text">
            <h1 class="site-title-main">Namo Narayanaya Bhakthi Channel</h1>
            <div class="site-title-sub">Dasabodha Grantha Telugu Lyrics</div>
        </div>
    </div>
</header>

<div class="search-area">
    <input type="text" id="postSearch" placeholder="Search Samasam Name..." aria-label="Search Samasam Name">
</div>

<main class="container" id="postsContainer">
    </main>

<nav class="nav-section">
    <p><strong>SELECT DASHAKAM</strong></p>
    <div class="scroll-container" id="dashButtons"></div>
</nav>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>
let allPosts = [];
let currentDashakam = 1;
let searchTimeout = null;

// ⚡ Performance: Optimized fetch with priority
document.addEventListener("DOMContentLoaded", () => {
    fetch("./data/posts.json?v=" + Date.now(), { priority: 'high' })
    .then(res => res.json())
    .then(data => {
        allPosts = data;
        renderPage();
        setupDashNav();
    })
    .catch(err => console.error("Error loading data:", err));
});

function openPost(url){
    window.location.href = "./" + url + "/";
}

function renderPage(searchTerm = "") {
    const container = document.getElementById("postsContainer");
    container.innerHTML = "";

    let filtered;
    if (searchTerm) {
        filtered = allPosts.filter(p =>
            p.title.toLowerCase().includes(searchTerm.toLowerCase())
        );
    } else {
        filtered = allPosts
            .filter(p => parseInt(p.dashakam) === currentDashakam)
            .sort((a, b) => {
                const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                return numA - numB;
            });
    }

    if (filtered.length === 0) {
        container.innerHTML = `
            <div style="text-align:center;padding:40px;background:#fff;border-radius:10px;">
                <h3 style="color:var(--primary);">🙏 Coming Soon</h3>
                <p>Dashakam ${currentDashakam} content is being prepared.</p>
            </div>`;
        return;
    }

    // ⚡ Performance: Using DocumentFragment for faster rendering
    const fragment = document.createDocumentFragment();
    filtered.forEach(post => {
        const card = document.createElement("article");
        card.className = "post-card";
        card.innerHTML = `
            <h2 class="post-title-click" onclick="openPost('${post.url}')">
                ${post.title}
            </h2>
            <p>${post.description.substring(0,130)}...</p>
        `;
        fragment.appendChild(card);
    });
    container.appendChild(fragment);
}

function setupDashNav(){
    const wrap = document.getElementById("dashButtons");
    const fragment = document.createDocumentFragment();

    for(let i=1;i<=20;i++){
        const btn = document.createElement("button");
        btn.innerText = "Dashakam " + i;
        btn.className = "dash-btn" + (i === currentDashakam ? " active" : "");
        btn.setAttribute("aria-label", "View Dashakam " + i);

        btn.onclick = () => {
            currentDashakam = i;
            document.querySelectorAll(".dash-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("postSearch").value = "";
            renderPage();
            // Scroll to top of posts smoothly
            document.getElementById("postsContainer").scrollIntoView({ behavior: 'smooth' });
        };
        fragment.appendChild(btn);
    }
    wrap.appendChild(fragment);
}

// ⚡ Performance: Debounced search (reduces CPU usage)
document.getElementById("postSearch").addEventListener("input", e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        renderPage(e.target.value);
    }, 350);
});
</script>

</body>
</html>
