<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>

<style>
:root {
  --primary:#C2185B;
  --secondary:#002366;
  --accent:#FFD700;
  --bg:#f4f6f9;
  --card-yellow:#FFFDE7;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:var(--bg);
}

/* 🔵 TOP MENU */
.blue-nav{
  background:#001a4d;
  padding:6px 0;
  display:flex;
  overflow-x:auto;
  white-space:nowrap;
}
.blue-nav a{
  color:#fff;
  text-decoration:none;
  font-size:14px;
  padding:4px 14px;
}

/* 🔴 PINK MENU */
.scroll-container{
  background:#C71585;
  padding:6px 0;
  display:flex;
  overflow-x:auto;
  white-space:nowrap;
}
.scroll-container a{
  background:#fff;
  color:#C71585;
  padding:6px 14px;
  margin:0 6px;
  border-radius:6px;
  text-decoration:none;
  flex-shrink:0;
}

/* HEADER */
header{
  background:var(--card-yellow);
  padding:20px 10px;
  text-align:center;
  border-bottom:4px solid var(--accent);
}

.site-title-main,
.site-title-sub{
  font-size:1.6rem;
  font-weight:800;
  color:var(--primary);
  white-space:nowrap;
}

.sub-title-box{
  background:var(--secondary);
  color:#fff;
  padding:6px 18px;
  border-radius:20px;
  margin-top:10px;
  display:inline-block;
  font-size:0.85rem;
}

/* SEARCH */
.search-container{
  padding:15px;
  text-align:center;
  background:#fff;
}
#postSearch{
  width:80%;
  max-width:280px;
  padding:10px;
  border-radius:20px;
  border:2px solid #ddd;
  text-align:center;
}

/* POSTS */
.container{
  max-width:700px;
  margin:auto;
  padding:15px;
}

.post-card{
  background:var(--card-yellow);
  padding:18px;
  margin-bottom:12px;
  border-radius:10px;
  border-left:5px solid var(--primary);
}

.post-card h2{
  margin:0;
  font-size:1.2rem;
}

.post-meta-desc{
  font-size:14px;
  margin:6px 0;
}

.read-link{
  color:var(--primary);
  font-weight:bold;
  text-decoration:none;
}

/* PAGINATION */
.pagination-wrapper{
  text-align:center;
  padding:20px;
}

.page-numbers-container{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.pg-btn{
  min-width:100px;
  padding:10px;
  border-radius:25px;
  border:1px solid #ccc;
}

.pg-btn.active{
  background:var(--secondary);
  color:#FFD700;
}

footer{
  background:var(--primary);
  color:#fff;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- 🔵 TOP MENU (LOCAL PAGES ONLY) -->
<nav class="blue-nav">
  <a href="/">Home</a>
  <a href="/about-us">About Us</a>
  <a href="/contact-us">Contact Us</a>
  <a href="/privacy-policy">Privacy Policy</a>
</nav>

<!-- 🔴 PINK MENU (EXTERNAL + MAIN SITE) -->
<div class="scroll-container">
  <a href="https://omnnbc.in/">Omnnbc</a>
  <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
  <a href="https://csrgnk.github.io/manache-shlok/">Manache Shlok Telugu</a>
  <a href="https://csrgnk.github.io/manache-shlok/hindi/">Manache Shlok Hindi</a>
</div>

<!-- HEADER -->
<header>
  <div class="site-title-main">Namo Narayanaya</div>
  <div class="site-title-sub">Bhakthi Channel</div>
  <div class="sub-title-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-container">
  <input type="text" id="postSearch" placeholder="Search Samasam Name...">
</div>

<div class="container" id="postsContainer">Loading...</div>

<div class="pagination-wrapper">
  <div class="page-numbers-container" id="paginationWrapper"></div>
</div>

<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>
let allPosts=[];
let currentDashakam=1;

fetch("./data/posts.json")
.then(r=>r.json())
.then(data=>{
  allPosts=data;
  renderPage();
});

function renderPage(){
  const container=document.getElementById("postsContainer");
  container.innerHTML="";

  const posts=allPosts.filter(p=>parseInt(p.dashakam)===currentDashakam);

  posts.forEach(post=>{
    const card=document.createElement("div");
    card.className="post-card";

    card.innerHTML=`
      <h2><a href="./${post.url}/">${post.title}</a></h2>
      <div class="post-meta-desc">${post.description||""}</div>
      <a href="./${post.url}/" class="read-link">READ →</a>
    `;

    container.appendChild(card);
  });

  setupPagination();
}

function setupPagination(){
  const wrapper=document.getElementById("paginationWrapper");
  wrapper.innerHTML="";

  for(let i=1;i<=20;i++){
    const btn=document.createElement("button");
    btn.className="pg-btn"+(i===currentDashakam?" active":"");
    btn.innerText="Dashakam "+i;
    btn.onclick=()=>{currentDashakam=i;renderPage();};
    wrapper.appendChild(btn);
  }
}
</script>

</body>
</html>
