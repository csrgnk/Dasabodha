<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dasabodha Grantha Telugu Lyrics | Namo Narayanaya</title>
    <style>
        :root {
            --primary: #C2185B;
            --secondary: #002366;
            --accent: #FFD700;
            --bg: #fdfbf7;
            --card-yellow: #FFFDE7; /* Light Yellow for Cards */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: var(--bg);
            color: #333;
            line-height: 1.5;
        }

        /* CENTERED TWO-LINE HEADER */
        header {
            background: #fff;
            padding: 20px 10px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .site-title-main {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            display: block; /* Forces to own line */
            margin: 0;
            line-height: 1.2;
        }

        .site-title-sub {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--secondary);
            display: block; /* Forces to second line */
            margin-top: 2px;
        }

        .sub-title-box {
            background: var(--secondary);
            color: #fff;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: inline-block;
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* SEARCH CONTAINER */
        .search-container {
            padding: 15px;
            background: #fff;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #eee;
        }

        #postSearch {
            width: 100%;
            max-width: 320px;
            padding: 12px;
            font-size: 16px; 
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        #postSearch:focus {
            border-color: var(--primary);
            background: #fff;
        }

        /* LIGHT YELLOW POST CARDS */
        .container {
            max-width: 700px;
            margin: auto;
            padding: 15px;
            min-height: 50vh;
        }

        .post-card {
            background: var(--card-yellow); /* Updated to Light Yellow */
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            border-left: 6px solid var(--primary);
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .post-card h2 {
            margin: 0 0 10px;
            font-size: 1.2rem;
            color: var(--secondary);
            line-height: 1.4;
        }

        .post-card h2 a {
            text-decoration: none;
            color: inherit;
        }

        .post-meta-desc {
            color: #555;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .read-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-block;
            border: 1px solid var(--primary);
            padding: 6px 15px;
            border-radius: 5px;
            background: #fff;
        }

        /* PAGINATION SLIDER */
        .pagination-wrapper {
            background: #fff;
            padding: 25px 0;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .page-numbers-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 15px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .page-numbers-container::-webkit-scrollbar { display: none; }

        .pg-btn {
            min-width: 110px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 30px;
            background: white;
            color: var(--secondary);
            font-weight: 600;
            flex-shrink: 0;
        }

        .pg-btn.active {
            background: var(--secondary);
            color: var(--accent);
            border-color: var(--secondary);
        }

        footer {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 30px 15px;
            font-size: 0.85rem;
        }

        @media (max-width: 480px) {
            .site-title-main { font-size: 1.3rem; }
            .site-title-sub { font-size: 1rem; }
            .post-card { padding: 15px; }
        }
    </style>
</head>
<body>

<header>
    <div class="site-title-main">Namo Narayanaya</div>
    <div class="site-title-sub">Bhakthi Channel</div>
    <div class="sub-title-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="search-container">
    <input type="text" id="postSearch" placeholder="Search Samasam Name...">
</div>

<div class="container" id="postsContainer">
    <div style="text-align:center; padding:50px;">Loading Content...</div>
</div>

<div class="pagination-wrapper">
    <p style="font-weight:bold; color:var(--primary); margin-bottom:10px;">Select Dashakam</p>
    <div class="page-numbers-container" id="paginationWrapper"></div>
</div>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel<br>
    <small>Sharing Spiritual Wisdom</small>
</footer>

<script>
    let allPosts = [];
    let currentDashakam = 1;

    // Data Fetching
    fetch("./data/posts.json?v=" + Date.now())
        .then(res => res.json())
        .then(data => {
            allPosts = data.sort((a, b) => {
                if (parseInt(a.dashakam) !== parseInt(b.dashakam)) {
                    return parseInt(a.dashakam) - parseInt(b.dashakam);
                }
                const numA = parseInt(a.url.match(/samasam-(\d+)/)?.[1] || 0);
                const numB = parseInt(b.url.match(/samasam-(\d+)/)?.[1] || 0);
                return numA - numB;
            });
            renderPage();
        });

    function renderPage() {
        const container = document.getElementById("postsContainer");
        container.innerHTML = "";
        const posts = allPosts.filter(p => parseInt(p.dashakam) === currentDashakam);

        if (posts.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:50px; color:#999;">Lyrics for Dashakam ${currentDashakam} coming soon.</div>`;
            setupPagination();
            return;
        }

        posts.forEach(post => {
            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <h2><a href="./${post.url}/">${post.title}</a></h2>
                <div class="post-meta-desc">${post.description || "Read Telugu lyrics for this samasam."}</div>
                <a href="./${post.url}/" class="read-link">READ LYRICS →</a>
            `;
            container.appendChild(card);
        });
        setupPagination();
    }

    function setupPagination() {
        const wrapper = document.getElementById("paginationWrapper");
        wrapper.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
            const btn = document.createElement("button");
            btn.className = "pg-btn" + (i === currentDashakam ? " active" : "");
            btn.innerText = "Dashakam " + i;
            btn.onclick = () => {
                currentDashakam = i;
                window.scrollTo({top: 0, behavior: 'smooth'});
                renderPage();
            };
            wrapper.appendChild(btn);
        }
        const activeBtn = wrapper.querySelector('.active');
        if(activeBtn) {
            wrapper.scrollTo({ left: activeBtn.offsetLeft - 40, behavior: 'smooth' });
        }
    }

    // Search Logic
    document.getElementById("postSearch").addEventListener("input", (e) => {
        const term = e.target.value.toLowerCase().trim();
        const container = document.getElementById("postsContainer");
        if (term === "") { renderPage(); return; }

        const filtered = allPosts.filter(p => p.title.toLowerCase().includes(term));
        container.innerHTML = "";
        
        filtered.forEach(post => {
            const card = document.createElement("div");
            card.className = "post-card";
            card.innerHTML = `
                <h2><a href="./${post.url}/">${post.title}</a></h2>
                <div class="post-meta-desc">${post.description || ""}</div>
                <a href="./${post.url}/" class="read-link">READ LYRICS →</a>
            `;
            container.appendChild(card);
        });
    });
</script>

</body>
</html>
