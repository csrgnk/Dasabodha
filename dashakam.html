<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasabodha Dashakams - Namo Narayanaya</title>
    <style>
        :root { --primary: #3FA3A1; --bg: #F4FBFB; --accent: #E91E63; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 900px; margin: auto; }
        .header { background: #fff; padding: 30px; border-radius: 15px; border-bottom: 5px solid var(--primary); text-align: center; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header h1 { color: var(--accent); margin: 0; font-size: 2rem; }
        .dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .dash-card { background: #fff; padding: 25px; text-align: center; border-radius: 12px; border: 1px solid #e0e0e0; cursor: pointer; transition: 0.3s; }
        .dash-card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .samasam-item { background: #fff; padding: 18px; border-radius: 10px; margin-bottom: 12px; border-left: 6px solid var(--primary); cursor: pointer; transition: 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .samasam-item:hover { transform: translateX(8px); background: #faffff; }
        .back-link { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }
        .loader { text-align: center; padding: 60px; font-size: 1.2rem; color: #aaa; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="content-view">
        <div class="loader">Loading content...</div>
    </div>
</div>

<script>
    const baseUrl = window.location.origin + "/";
    const contentView = document.getElementById("content-view");

    // Improved logic to extract Dashakam number from URL
    const currentPath = window.location.pathname;
    let targetDashakam = null;

    if (currentPath.includes("dashakam-")) {
        // Extracts digits after 'dashakam-'
        const parts = currentPath.split('/');
        const dashPart = parts.find(p => p.includes("dashakam-"));
        if (dashPart) {
            const numMatch = dashPart.match(/\d+/);
            if (numMatch) targetDashakam = parseInt(numMatch[0]);
        }
    }

    fetch(baseUrl + "data/posts.json?v=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
            if (targetDashakam) {
                renderSamasams(data, targetDashakam);
            } else {
                renderGrid(data);
            }
        })
        .catch(err => {
            contentView.innerHTML = `<div class="loader">Error loading data.</div>`;
        });

    function renderGrid(data) {
        const uniqueDash = [...new Set(data.map(item => parseInt(item.dashakam)))].filter(n => !isNaN(n)).sort((a, b) => a - b);
        let html = `<div class="header"><h1>Sri Dasabodha Dashakams</h1><p>Select a Dashakam</p></div><div class="dash-grid">`;
        uniqueDash.forEach(num => {
            html += `<div class="dash-card" onclick="window.location.href='${baseUrl}dashakam-${num}/'"><h2>Dashakam ${num}</h2><span>View Samasams</span></div>`;
        });
        html += `</div>`;
        contentView.innerHTML = html;
    }

    function renderSamasams(data, num) {
        // Strict filtering based on Dashakam number
        const samasams = data.filter(p => parseInt(p.dashakam) === num)
                             .sort((a, b) => a.url.localeCompare(b.url, undefined, {numeric: true}));

        let html = `<a class="back-link" onclick="window.location.href='${baseUrl}dashakam.html'">← Back</a><div class="header"><h1>Dashakam ${num}</h1><p>List of Samasams</p></div>`;

        if (samasams.length === 0) {
            html += `<div class="loader">No Samasams found for Dashakam ${num}.</div>`;
        } else {
            samasams.forEach(post => {
                html += `<div class="samasam-item" onclick="window.location.href='${baseUrl}${post.url}/'"><h3>${post.title}</h3><p>${post.publish_date}</p></div>`;
            });
        }
        contentView.innerHTML = html;
    }
</script>

</body>
</html>
