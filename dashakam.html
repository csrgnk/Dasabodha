<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashakam Samasams - Namo Narayanaya</title>
    <style>
        :root { --primary: #3FA3A1; --bg: #F4FBFB; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .header { background: #fff; padding: 20px; border-radius: 10px; border-bottom: 4px solid var(--primary); text-align: center; margin-bottom: 20px; }
        .header h1 { color: #E91E63; margin: 0; }
        .list-container { display: flex; flex-direction: column; gap: 10px; }
        .post-item { 
            background: #fff; 
            padding: 15px; 
            border-radius: 8px; 
            text-decoration: none; 
            color: #333; 
            border-left: 5px solid var(--primary); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: bold;
        }
        .post-item:hover { background: #f0fdfa; transform: translateX(5px); transition: 0.2s; }
        .loader { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div id="content-view">
        <div class="loader">Loading Samasams List...</div>
    </div>
</div>

<script>
    const jsonUrl = "/data/posts.json";
    const displayArea = document.getElementById("content-view");

    async function startSetup() {
        const path = window.location.pathname;
        // Detect if URL is dashakam-1, dashakam-2, etc.
        const match = path.match(/dashakam-(\d+)/);
        const dashID = match ? parseInt(match[1]) : null;

        try {
            const res = await fetch(jsonUrl + "?nocache=" + Date.now());
            const data = await res.json();

            if (dashID) {
                // Filter posts where dashakam number matches JSON
                const results = data.filter(p => Number(p.dashakam) === dashID);
                results.sort((a, b) => a.url.localeCompare(b.url, undefined, {numeric: true}));
                renderSamasams(results, dashID);
            } else {
                renderCategories(data);
            }
        } catch (e) {
            displayArea.innerHTML = "Error loading posts.json";
        }
    }

    function renderSamasams(posts, num) {
        let html = `<div class="header"><h1>Dashakam ${num}</h1></div><div class="list-container">`;
        if (posts.length === 0) {
            html += `<div class="loader">No posts found for Dashakam ${num}</div>`;
        } else {
            posts.forEach(p => {
                html += `<a href="/${p.url}/" class="post-item">${p.title}</a>`;
            });
        }
        html += `</div><br><center><a href="/dashakam.html">Back to All Dashakams</a></center>`;
        displayArea.innerHTML = html;
    }

    function renderCategories(data) {
        const unique = [...new Set(data.map(p => Number(p.dashakam)))].filter(n => !isNaN(n)).sort((a,b) => a - b);
        let html = `<div class="header"><h1>All Dashakams</h1></div><div class="list-container">`;
        unique.forEach(n => {
            html += `<a href="/dashakam-${n}/" class="post-item">Dashakam ${n}</a>`;
        });
        html += `</div>`;
        displayArea.innerHTML = html;
    }

    startSetup();
</script>

</body>
</html>
