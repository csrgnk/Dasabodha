<script>
    async function generateSitemap() {
        const outputSection = document.getElementById('output-section');
        const outputArea = document.getElementById('sitemap-output');
        const status = document.getElementById('status-msg');
        // Automatically detects if it's on dasabodha or main site
        const domain = window.location.origin; 
        const today = new Date().toISOString().split('T')[0];
        
        outputSection.style.display = 'block';
        status.innerText = "Scanning JSON files... please wait.";

        try {
            let xmlLines = [
                '<?xml version="1.0" encoding="UTF-8"?>',
                '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">',
                '  <url>',
                `    <loc>${domain}/</loc>`,
                `    <lastmod>${today}</lastmod>`,
                '    <priority>1.0</priority>',
                '  </url>'
            ];

            // 1. PROCESS PAGES
            let pageCount = 0;
            const pRes = await fetch('data/pages.json');
            if (pRes.ok) {
                const pData = await pRes.json();
                pData.forEach(p => {
                    // Smart Check: look for .file, .url, or .slug
                    let rawPath = p.file || p.url || p.slug || "";
                    if (rawPath) {
                        let slug = rawPath.replace('.html', '').replace(/^\//, '');
                        if (slug !== 'index' && slug !== '') {
                            xmlLines.push('  <url>');
                            xmlLines.push(`    <loc>${domain}/${slug}</loc>`);
                            xmlLines.push(`    <lastmod>${today}</lastmod>`);
                            xmlLines.push('    <priority>0.9</priority>');
                            xmlLines.push('  </url>');
                            pageCount++;
                        }
                    }
                });
            }

            // 2. PROCESS POSTS (FIXED SECTION)
            let postCount = 0;
            const poRes = await fetch('data/posts.json');
            if (poRes.ok) {
                const poData = await poRes.json();
                poData.forEach(post => {
                    // Smart Check: look for common JSON keys
                    let rawPath = post.file || post.slug || post.url || post.link || "";
                    if (rawPath) {
                        // Clean the path: remove .html, remove leading slashes
                        let slug = rawPath.split('/').pop().replace('.html', '');
                        let date = post.publish_date || post.date || today;
                        // Format date to YYYY-MM-DD
                        date = date.split('T')[0];

                        xmlLines.push('  <url>');
                        xmlLines.push(`    <loc>${domain}/${slug}</loc>`);
                        xmlLines.push(`    <lastmod>${date}</lastmod>`);
                        xmlLines.push('    <priority>0.8</priority>');
                        xmlLines.push('  </url>');
                        postCount++;
                    }
                });
            }

            xmlLines.push('</urlset>');
            outputArea.value = xmlLines.join('\n');
            status.innerText = `Success! Found ${pageCount} Pages and ${postCount} Posts.`;

        } catch (error) {
            status.innerText = "Error reading JSON: " + error.message;
            console.error(error);
        }
    }
</script>
