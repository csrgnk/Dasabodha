<script>
const repoName = "Dasabodha";
const mainHome = "https://dasabodha.omnnbc.in/";
const path = window.location.pathname;
const slug = path.split('/').filter(p => p && p !== repoName).pop();
const isCustomDomain = window.location.hostname.includes("omnnbc.in");
const fetchBase = isCustomDomain ? "" : `/${repoName}`;

// 🔗 SHARE BUTTONS
function buildShareButtons(title) {
    const url = window.location.href;
    const text = encodeURIComponent(title + " - " + url);

    return `
    <div style="margin-top:30px; text-align:center;">
        <h3 style="margin-bottom:10px;">Share</h3>
        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
            
            <a href="https://wa.me/?text=${text}" target="_blank" class="btn-action">WhatsApp</a>
            
            <a href="https://www.facebook.com/sharer/sharer.php?u=${url}" target="_blank" class="btn-action">Facebook</a>
            
            <a href="https://twitter.com/intent/tweet?text=${text}" target="_blank" class="btn-action">Twitter</a>
            
            <button onclick="copyLink()" class="btn-action">Copy Link</button>
        </div>
    </div>`;
}

// 📋 COPY LINK
function copyLink() {
    navigator.clipboard.writeText(window.location.href);
    alert("Link copied!");
}

// 🔁 NAV BUTTONS
function buildNav(posts, index) {
    const prev = posts[index - 1];
    const next = posts[index + 1];

    let html = `<div class="post-nav">`;
    html += prev ? `<a href="${fetchBase}/${prev.url}" class="btn-action">← Prev</a>` : `<div class="hidden"></div>`;
    html += `<a href="${mainHome}" class="btn-home">HOME</a>`;
    html += next ? `<a href="${fetchBase}/${next.url}" class="btn-action">Next →</a>` : `<div class="hidden"></div>`;
    html += `</div>`;
    return html;
}

// ⏳ COMING SOON
function showComingSoon(posts, index, title="") {
    document.getElementById("postContent").innerHTML = `
    <div class="status-msg">
        <h2>Coming Soon...</h2>
        <p>We are currently updating the lyrics for this chapter.</p>
        ${buildShareButtons(title)}
        <div style="margin-top:20px;">
            ${buildNav(posts, index)}
        </div>
    </div>`;
}

// ❌ NOT FOUND
function showNotFound() {
    document.getElementById("postTitle").innerText = "Not Found";
    document.getElementById("postContent").innerHTML = `
    <div class="status-msg">
        <h2>404 - Not Found</h2>
        <p>The requested page was not found.</p>
        <div style="margin-top:20px;">
            <a href="${mainHome}" class="btn-home">Return Home</a>
        </div>
    </div>`;
}

// 🔄 FETCH POSTS
fetch(`${fetchBase}/data/posts.json?v=${Date.now()}`)
.then(r => r.json())
.then(posts => {

    // 🔥 AUTO EXTRACT DASHAKAM & SAMASAM
    posts.forEach(p => {

        let dMatch = p.title.match(/Dashakam\s*(\d+)/i) || p.url.match(/dashakam-(\d+)/i);
        if (dMatch) p.dashakam = parseInt(dMatch[1]);

        let sMatch = p.title.match(/Samasam\s*(\d+)/i) || p.url.match(/samasam-(\d+)/i);
        if (sMatch) p.samasam = parseInt(sMatch[1]);

    });

    // 🔥 SORT ORDER
    posts.sort((a, b) => {
        if (a.dashakam !== b.dashakam) {
            return a.dashakam - b.dashakam;
        }
        return a.samasam - b.samasam;
    });

    const index = posts.findIndex(p => p.url === slug);
    const post = posts[index];

    if (post) {
        document.title = post.title;
        document.getElementById("postTitle").innerText = post.title;
        document.getElementById("metaDesc").content = post.description || post.title;

        fetch(`${fetchBase}/posts/${slug}.html`)
        .then(res => {
            if (res.ok) return res.text();
            throw new Error("Missing File");
        })
        .then(html => {
            const temp = document.createElement("div");
            temp.innerHTML = html;

            temp.querySelectorAll("header,footer,nav,script,style,meta,title")
                .forEach(e => e.remove());

            document.getElementById("postContent").innerHTML =
                temp.innerHTML +
                buildShareButtons(post.title) +
                buildNav(posts, index);
        })
        .catch(() => {
            showComingSoon(posts, index, post.title);
        });

    } else {
        showNotFound();
    }

})
.catch(() => {
    document.getElementById("postContent").innerHTML =
        "Error loading data. Please refresh.";
});
</script>
