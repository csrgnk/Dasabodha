<!DOCTYPE html>
<html lang="te">
<head>
    <script type="text/javascript">
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onselectstart = () => false;
    </script>

    <style>
        body { -webkit-user-select: none; user-select: none; margin: 0; font-family: Arial, sans-serif; background: #F4FBFB; color: #333; }
    </style>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Namo Narayanaya</title>

    <style>
        :root {
            --primary: #3FA3A1;
            --nav-bg: #145A5A;
            --accent: #F4D03F;
            --site-pink: #E91E63;
        }

        /* HEADER */
        .site-header {
            background: #fff;
            padding: 15px;
            border-bottom: 3px solid var(--accent);
            text-align: center;
        }
        .site-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--site-pink); }
        .title-wrap { text-align: left; color: var(--site-pink); font-weight: 800; }
        .title-line1 { font-size: 1.6rem; display: block; line-height: 1.1; }
        .title-line2 { font-size: 1.2rem; display: block; }

        /* ERROR CONTENT */
        .container {
            max-width: 600px;
            margin: 80px auto;
            padding: 20px;
            text-align: center;
        }
        .error-code {
            font-size: 100px;
            font-weight: bold;
            color: var(--nav-bg);
            margin: 0;
            opacity: 0.2;
        }
        .error-message {
            font-size: 24px;
            color: var(--primary);
            margin-top: -30px;
            font-weight: bold;
        }
        .description {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
            margin: 20px 0;
        }

        /* HOME BUTTON */
        .btn-home {
            display: inline-block;
            padding: 15px 35px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(63, 163, 161, 0.3);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            background: var(--nav-bg);
        }

        .site-footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #145A5A;
            color: #fff;
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
        }

        @media(min-width: 768px) {
            .title-wrap { display: flex; gap: 10px; align-items: center; }
            .title-line1, .title-line2 { font-size: 1.8rem; }
        }
    </style>
</head>

<body>

<header class="site-header">
    <div class="site-brand">
        <img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="logo" alt="Logo">
        <div class="title-wrap">
            <span class="title-line1">Namo Narayanaya</span>
            <span class="title-line2">Bhakthi Channel</span>
        </div>
    </div>
</header>

<div class="container">
    <h1 class="error-code">404</h1>
    <div class="error-message">పేజీ కనబడలేదు (Not Found)</div>
    <p class="description">
        క్షమించండి! మీరు వెతుకుతున్న సమాచారం లేదా పేజీ ఇక్కడ అందుబాటులో లేదు. <br>
        లింక్ తప్పుగా ఉండవచ్చు లేదా ఆ సమాచారం తొలగించబడి ఉండవచ్చు.
    </p>
    <a href="/" class="btn-home">మళ్ళీ హోమ్ పేజీకి వెళ్ళండి</a>
</div>

<footer class="site-footer">
    © 2026 Namo Narayanaya Bhakthi Channel
</footer>

</body>
</html>
