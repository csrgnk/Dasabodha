<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">Loading... - Namo Narayanaya</title>
    <meta id="metaDesc" name="description" content="Dasabodha Grantha Telugu Lyrics">
    <style>
        * { box-sizing: border-box; }
        body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f9; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        .nav-menu { background: #C2185B; padding: 12px 5px; text-align: center; position: sticky; top: 0; z-index: 1000; white-space: nowrap; overflow-x: auto; }
        .nav-menu a { color: white; text-decoration: none; margin: 0 12px; font-weight: bold; font-size: 14px; display: inline-block; }
        .nav-menu a.home-btn { background: #fff; color: #C2185B; padding: 5px 15px; border-radius: 4px; }

        header { background:#fff9db; padding:30px 10px; text-align:center; color:#C2185B; border-bottom: 3px solid #FFD700; display: flex; flex-direction: column; align-items: center; }
        .header-main { font-size: 1.8rem; font-weight: bold; }
        .header-sub-box { background: #002366; color: #ffffff; padding: 8px 25px; border-radius: 50px; font-size: 1.1rem; font-weight: 500; margin-top: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 15px; flex: 1; }
        .content-area { background:#fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; }
        #postTitle { color: #002366; text-align: center; margin-top: 0; padding-bottom: 15px; border-bottom: 2px solid #fff9db; font-size: 1.5rem; }
        
        footer { background: #C2185B; color: white; text-align: center; padding: 20px; margin-top: auto; }
    </style>
</head>
<body>

<nav class="nav-menu">
    <a href="/Dasabodha/" class="home-btn">Home</a>
    <a href="/Dasabodha/about-us">About Us</a>
    <a href="/Dasabodha/contact-us">Contact Us</a>
    <a href="/Dasabodha/privacy-policy">Privacy Policy</a>
</nav>

<header>
    <div class="header-main">Namo Narayanaya Bhakthi Channel</div>
    <div class="header-sub-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="container">
    <article class="content-area">
        <h1 id="postTitle">Loading...</h1>
        <div id="postContent"></div>
    </article>
    <div style="text-align:center; margin-top:20px;">
        <a href="/Dasabodha/" style="color:#C2185B; font-weight:bold; text-decoration:none;">← Back to Home</a>
    </div>
</div>

<footer><p>© 2026 Namo Narayanaya Bhakthi Channel</p></footer>

<script>
    const path = window.location.pathname;
    const cleanId = path.split('/').filter(Boolean).pop();
    const repo = "/Dasabodha"; 

    if (cleanId && cleanId !== 'Dasabodha') {
        fetch(`${repo}/data/posts.json`).then(res => res.json()).then(posts => {
            const post = posts.find(p => p.url.includes(cleanId));
            if (post) {
                loadContent(`${repo}/posts/${cleanId}.html`, post.title);
            } else {
                return fetch(`${repo}/data/pages.json`).then(res => res.json());
            }
        }).then(pages => {
            if (!pages) return;
            const page = pages.find(p => p.id === cleanId);
            if (page) loadContent(`${repo}/${page.file}`, page.title);
        }).catch(() => { document.getElementById('postTitle').innerText = "Page Not Found"; });
    }

    function loadContent(url, title) {
        document.getElementById('postTitle').innerText = title;
        document.title = title + " - Dasabodha";
        fetch(url).then(res => res.text()).then(html => {
            const temp = document.createElement('div');
            temp.innerHTML = html;
            const extras = temp.querySelectorAll('header, footer, nav, style, script');
            extras.forEach(e => e.remove());
            document.getElementById('postContent').innerHTML = temp.innerHTML;
        });
    }
</script>
</body>
</html>
