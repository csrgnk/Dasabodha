<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Namo Narayanaya</title>
    
    <meta name="description" content="Namo Narayanaya Bhakthi Channel - Dasabodha Telugu Lyrics">
    <meta name="keywords" content="Dasabodha, Telugu, Bhakthi, Namo Narayanaya">

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #3FA3A1;
            --secondary: #1A1A1A;
            --accent: #F4D03F;
            --bg: #F4FBFB;
            --top-links-bg: #145A5A;
            --outer-links-bg: #3FA3A1;
        }

        body {
            margin: 0;
            padding-top: 95px;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* NAV */
        .fixed-nav-wrapper { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .top-links { background: var(--top-links-bg); display: flex; overflow-x: auto; padding: 10px 12px; gap: 18px; scrollbar-width: none; }
        .outer-links { background: var(--outer-links-bg); display: flex; overflow-x: auto; padding: 12px 14px; gap: 20px; scrollbar-width: none; }
        .fixed-nav-wrapper a { color: #fff; text-decoration: none; font-size: 0.9rem; font-weight: 700; padding: 6px 10px; border-radius: 6px; }

        /* HEADER */
        header { background: #fff; padding: 15px 10px; border-bottom: 3px solid var(--accent); }
        .header-flex { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header-logo { width: 60px; height: 60px; border-radius: 50%; }
        .site-title-main { font-family: 'Crimson Text', serif; font-size: 1.4rem; font-weight: 700; color: #E91E63; margin: 0; }
        .site-title-sub { background: #fff; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; color: var(--secondary); }

        /* CONTENT */
        .container { max-width: 800px; margin: auto; padding: 20px; flex: 1; width: 100%; box-sizing: border-box; }
        .post-title { background: linear-gradient(135deg, #2E8B87, #3FA3A1); color: #fff; text-align: center; padding: 12px; font-size: 1.5rem; border-radius: 10px; margin-bottom: 15px; text-transform: capitalize; }
        .post-content { background: #fff; padding: 20px; border-radius: 10px; font-size: 19px; line-height: 1.8; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* NAVIGATION BUTTONS */
        .nav-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; gap: 10px; }
        .btn-nav { background: var(--primary); color: #white !important; padding: 10px 18px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; color: white; }
        .btn-home { border: 2px solid var(--primary); color: var(--primary); padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: 700; }

        footer { background: #2E8B87; color: #fff; text-align: center; padding: 20px; font-size: 0.85rem; margin-top: 40px; }
    </style>
</head>
<body>

<div class="fixed-nav-wrapper">
    <div class="top-links">
        <a href="https://dasabodha.omnnbc.in/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
        <a href="/privacy-policy">Privacy Policy</a>
    </div>
    <div class="outer-links">
        <a href="https://csrgnk.github.io/Omnnbc/">Main site</a>
        <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
        <a href="https://csrgnk.github.io/manache-shlok/">Manache Shlok Telugu</a>
    </div>
</div>

<header>
    <div class="header-flex">
        <img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png" class="header-logo" alt="Logo">
        <div class="header-text">
            <div class="site-title-main">Namo Narayanaya Bhakthi Channel</div>
            <div class="site-title-sub">Dasabodha Grantha Telugu Lyrics</div>
        </div>
    </div>
</header>

<div class="container">
    <div class="post-title" id="postTitle">Loading...</div>
    <div class="post-content" id="postContent">
        <div style="text-align:center;">Searching for content...</div>
    </div>
</div>

<footer>© 2026 Namo Narayanaya Bhakthi Channel</footer>

<script>
const repoName = "Dasabodha";
const mainHome = "https://dasabodha.omnnbc.in/";
const path = window.location.pathname;

// Extract the slug correctly even on custom domains
const segments = path.split('/').filter(p => p && p !== repoName);
const slug = segments.pop();

const isCustomDomain = window.location.hostname.includes("omnnbc.in");
const fetchBase = isCustomDomain ? "" : `/${repoName}`;

// 1. Update Meta Tags
function updateSEO(post) {
    if(!post) return;
    document.title = post.title;
    
    let desc = document.querySelector('meta[name="description"]');
    if(desc) desc.setAttribute("content", post.description || post.title);
    
    let keys = document.querySelector('meta[name="keywords"]');
    if(keys) keys.setAttribute("content", post.keywords || "Dasabodha, Telugu, Bhakthi");
}

// 2. Build Navigation UI
function getNavHtml(posts, index) {
    const prev = posts[index - 1];
    const next = posts[index + 1];

    let html = `<div class="nav-controls">`;
    
    // Previous Button
    if (prev) {
        html += `<a href="${fetchBase}/${prev.url}" class="btn-nav">← Previous</a>`;
    } else {
        html += `<span></span>`; 
    }

    // Home Button
    html += `<a href="${mainHome}" class="btn-home">HOME</a>`;

    // Next Button
    if (next) {
        html += `<a href="${fetchBase}/${next.url}" class="btn-nav">Next →</a>`;
    } else {
        html += `<span></span>`;
    }

    html += `</div>`;
    return html;
}

// 3. Main Logic
if (!slug || slug === "index.html") {
    window.location.href = mainHome;
} else {
    // Fetch the JSON first to get meta and order
    fetch(`${fetchBase}/data/posts.json?v=${Date.now()}`)
    .then(r => r.json())
    .then(posts => {
        const index = posts.findIndex(p => p.url === slug);
        const post = posts[index];

        if (post) {
            updateSEO(post);
            document.getElementById("postTitle").innerText = post.title;

            // Fetch the actual HTML content
            fetch(`${fetchBase}/posts/${slug}.html`)
            .then(res => {
                if(!res.ok) throw new Error();
                return res.text();
            })
            .then(html => {
                const temp = document.createElement("div");
                temp.innerHTML = html;
                temp.querySelectorAll("header,footer,nav,script,style,meta,title").forEach(e => e.remove());
                
                const navHtml = getNavHtml(posts, index);
                document.getElementById("postContent").innerHTML = temp.innerHTML + navHtml;
            })
            .catch(() => show404());
        } else {
            show404();
        }
    })
    .catch(() => show404());
}

function show404() {
    document.title = "Page Not Found";
    document.getElementById("postTitle").innerText = "404 - Content Not Found";
    document.getElementById("postContent").innerHTML = 
    `<div style="text-align:center; padding:40px 0;">
        <p>క్షమించండి, ఈ పేజీ అందుబాటులో లేదు.</p>
        <a href="${mainHome}" class="btn-home">Go to Home Page</a>
    </div>`;
}
</script>

</body>
</html>
