<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namo Narayanaya Bhakthi Channel</title>

<meta name="description" id="metaDesc" content="Dasabodha Telugu Lyrics">

<style>
:root{
--primary:#3FA3A1;
--nav-bg:#145A5A;
--bg:#F4FBFB;
--accent:#F4D03F;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:var(--bg);
}

/* NAV */
.nav-scroll{
background:var(--nav-bg);
display:flex;
overflow-x:auto;
padding:10px;
}
.nav-scroll a{
color:#fff;
text-decoration:none;
padding:6px 12px;
margin:0 4px;
background:rgba(255,255,255,0.1);
border-radius:4px;
white-space:nowrap;
font-size: 14px;
}

/* HEADER */
.site-header{
background:#fff;
padding:12px;
border-bottom:3px solid var(--accent);
}
.site-brand{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}
.logo { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
.title-wrap{
text-align:left;
color:#E91E63;
font-weight:700;
}
.title-line1{font-size:18px;}
.title-line2{font-size:14px;}

/* 🍞 BREADCRUMBS */
.breadcrumbs {
    padding: 10px 0;
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
}
.breadcrumbs a {
    color: var(--primary);
    text-decoration: none;
    font-weight: bold;
}
.breadcrumbs span {
    margin: 0 5px;
    color: #ccc;
}

/* CONTENT */
.container{
max-width:800px;
margin:5px auto;
padding:10px;
}
.post-title{
background:linear-gradient(135deg,#2E8B87,#3FA3A1);
color:#fff;
padding:15px;
text-align:center;
border-radius:10px;
font-size: 20px;
}
.post-content{
background:#fff;
padding:20px;
margin-top:15px;
border-radius:10px;
line-height:1.8;
box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

/* 📲 NEW SHARE SETUP (Horizontal Flex) */
.share-box{
margin-top:30px;
padding:20px;
border-top: 1px solid #eee;
text-align:center;
}
.share-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
}
.share-btn{
    flex: 1;
    min-width: 80px;
    padding: 10px 5px;
    background: var(--primary);
    color: #fff;
    border-radius: 5px;
    text-decoration: none;
    border: none;
    font-size: 13px;
    cursor: pointer;
    font-weight: bold;
}
.share-btn.copy { background: #555; }

/* NAV BUTTONS */
.post-nav{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:30px;
}
.btn-action, .btn-home {
    padding:12px;
    text-align:center;
    border-radius:5px;
    text-decoration:none;
    font-weight: bold;
    font-size: 14px;
}
.btn-action{ background:var(--primary); color:#fff; }
.btn-home{ border:2px solid var(--primary); color:var(--primary); }

.site-footer{
background:#2E8B87;
color:#fff;
text-align:center;
padding:25px 10px;
margin-top:40px;
font-size:14px;
}

@media(min-width:768px){
    .title-wrap { display:flex; gap:6px; align-items:center; }
    .title-line1,.title-line2{font-size:20px;}
}
</style>
</head>

<body>

<nav class="nav-scroll">
<a href="/">Home</a>
<a href="https://omnnbc.com/">Main Site</a>
<a href="/about-us">About Us</a>
<a href="/contact-us">Contact Us</a>
</nav>

<header class="site-header">
<div class="site-brand">
<img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="logo" alt="Logo">
<div class="title-wrap">
<div class="title-line1">Namo Narayanaya</div>
<div class="title-line2">Bhakthi Channel</div>
</div>
</div>
</header>

<div class="container">
    <div id="breadcrumb" class="breadcrumbs"></div>
    
    <div id="postTitle" class="post-title">Loading...</div>
    <div id="postContent" class="post-content">Loading...</div>
</div>

<script>
const repoName = "Dasabodha";
const mainHome = window.location.origin + "/";

const pathParts = location.pathname.split('/').filter(Boolean);
const slug = pathParts[pathParts.length - 1] || "index";

const isCustomDomain = location.hostname.includes("omnnbc.in");
const fetchBase = isCustomDomain ? "" : `/${repoName}`;

/* BREADCRUMBS LOGIC */
function buildBreadcrumbs(pageTitle, isPost = true) {
    const breadcrumbDiv = document.getElementById("breadcrumb");
    let html = `<a href="${mainHome}">Dasabodha</a>`;
    if (isPost) {
        html += `<span>&gt;</span><a href="${mainHome}">Posts</a>`;
    }
    html += `<span>&gt;</span> ${pageTitle}`;
    breadcrumbDiv.innerHTML = html;
}

/* UPDATED SHARE SECTION */
function shareButtons(title) {
    let url = location.href;
    let text = encodeURIComponent(title + " - " + url);
    return `
    <div class="share-box">
        <b>Share this Content</b>
        <div class="share-grid">
            <a class="share-btn" href="https://wa.me/?text=${text}" target="_blank" style="background:#25D366;">WhatsApp</a>
            <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${url}" target="_blank" style="background:#1877F2;">Facebook</a>
            <a class="share-btn" href="https://twitter.com/intent/tweet?text=${text}" target="_blank" style="background:#1DA1F2;">Twitter</a>
            <button class="share-btn copy" onclick="copyLink()">Copy Link</button>
        </div>
    </div>`;
}

function copyLink() {
    navigator.clipboard.writeText(location.href);
    alert("Link Copied to Clipboard!");
}

/* NAVIGATION */
function buildNav(posts, i) {
    let prev = posts[i - 1];
    let next = posts[i + 1];
    return `<div class="post-nav">
        ${prev ? `<a href="${fetchBase}/${prev.url}/" class="btn-action">← Prev</a>` : `<div></div>`}
        <a href="${mainHome}" class="btn-home">HOME</a>
        ${next ? `<a href="${fetchBase}/${next.url}/" class="btn-action">Next →</a>` : `<div></div>`}
    </div>`;
}

/* LOAD STATIC PAGE */
function loadPage(page) {
    fetch(`${fetchBase}/pages/${page.file}.html`)
        .then(r => r.text())
        .then(html => {
            let temp = document.createElement("div");
            temp.innerHTML = html;
            temp.querySelectorAll("header,footer,nav,script,style").forEach(e => e.remove());
            
            document.getElementById("postTitle").innerText = page.title;
            buildBreadcrumbs(page.title, false);
            
            document.getElementById("postContent").innerHTML = 
                temp.innerHTML + 
                shareButtons(page.title) + 
                `<div class="post-nav"><div></div><a href="${mainHome}" class="btn-home">HOME</a><div></div></div>`;
        });
}

/* LOAD MAIN DATA */
Promise.all([
    fetch(`${fetchBase}/data/posts.json`).then(r => r.json()),
    fetch(`${fetchBase}/data/pages.json`).then(r => r.json())
])
.then(([posts, pages]) => {
    posts.forEach(p => {
        let d = p.title.match(/Dashakam\s*(\d+)/i) || p.url.match(/dashakam-(\d+)/i);
        let s = p.title.match(/Samasam\s*(\d+)/i) || p.url.match(/samasam-(\d+)/i);
        if (d) p.dashakam = parseInt(d[1]);
        if (s) p.samasam = parseInt(s[1]);
    });

    posts.sort((a, b) => {
        if (a.dashakam !== b.dashakam) return a.dashakam - b.dashakam;
        return a.samasam - b.samasam;
    });

    let i = posts.findIndex(p => p.url === slug);
    let post = posts[i];

    if (post) {
        document.getElementById("postTitle").innerText = post.title;
        buildBreadcrumbs(post.title, true);

        fetch(`${fetchBase}/posts/${slug}.html`)
            .then(r => r.text())
            .then(html => {
                let temp = document.createElement("div");
                temp.innerHTML = html;
                temp.querySelectorAll("header,footer,nav,script,style").forEach(e => e.remove());
                document.getElementById("postContent").innerHTML =
                    temp.innerHTML +
                    shareButtons(post.title) +
                    buildNav(posts, i);
            });
        return;
    }

    let page = pages.find(p => p.id === slug);
    if (page) { loadPage(page); return; }

    document.getElementById("postTitle").innerText = "404 - Not Found";
    document.getElementById("postContent").innerHTML = `<div style="text-align:center;padding:50px;"><a href="${mainHome}" class="btn-home">Return Home</a></div>`;
});
</script>

<footer class="site-footer">
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

</body>
</html>
