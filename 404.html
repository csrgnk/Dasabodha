<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Namo Narayanaya</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #3FA3A1;
    --secondary: #1A1A1A;
    --accent: #F4D03F;
    --bg: #F4FBFB;

    --top-links-bg: #145A5A;
    --outer-links-bg: #3FA3A1;
}

body{
    margin:0;
    padding-top:95px;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* NAV */
.fixed-nav-wrapper{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:1000;
}

.top-links{
    background:var(--top-links-bg);
    display:flex;
    overflow-x:auto;
    white-space:nowrap;
    padding:10px 12px;
    gap:18px;
    scrollbar-width:none;
}
.top-links::-webkit-scrollbar{display:none;}

.outer-links{
    background:var(--outer-links-bg);
    display:flex;
    overflow-x:auto;
    white-space:nowrap;
    padding:12px 14px;
    gap:20px;
    scrollbar-width:none;
}
.outer-links::-webkit-scrollbar{display:none;}

.fixed-nav-wrapper a{
    color:#fff;
    text-decoration:none;
    font-size:0.9rem;
    font-weight:700;
    padding:6px 10px;
    border-radius:6px;
}

/* HEADER */
header{
    background:#fff;
    padding:15px 10px;
    border-bottom:3px solid var(--accent);
}

.header-flex{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}

.header-logo{
    width:60px;
    height:60px;
    border-radius:50%;
}

.header-text{
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.site-title-main{
    font-family:'Crimson Text',serif;
    font-size:1.4rem;
    font-weight:700;
    color:#E91E63;
    margin:0;
    line-height:1.2;
}

.site-title-sub{
    margin-top:3px;
    display:inline-block;
    background:#fff;
    padding:3px 10px;
    border-radius:20px;
    font-size:0.75rem;
    color:var(--secondary);
}

/* CONTENT */
.container{
    max-width:800px;
    margin:auto;
    padding:20px;
    flex:1;
}

.post-title{
    background:linear-gradient(135deg,#2E8B87,#3FA3A1);
    color:#fff;
    text-align:center;
    padding:12px;
    font-size:1.5rem;
    border-radius:10px;
    margin-bottom:15px;
}

.post-content{
    background:#fff;
    padding:20px;
    border-radius:10px;
    font-size:19px;
    line-height:1.8;
}

/* FOOTER */
footer{
    background:#2E8B87;
    color:#fff;
    text-align:center;
    padding:20px;
    font-size:0.85rem;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="fixed-nav-wrapper">
    <div class="top-links">
        <a href="https://dasabodha.omnnbc.in/">Home</a>
        <a href="/about-us">About Us</a>
        <a href="/contact-us">Contact Us</a>
        <a href="/privacy-policy">Privacy Policy</a>
    </div>

    <div class="outer-links">
        <a href="https://csrgnk.github.io/Omnnbc/">Main site</a>
        <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
        <a href="https://csrgnk.github.io/manache-shlok/">Manache Shlok Telugu</a>
        <a href="https://csrgnk.github.io/manache-shlok/hindi/">Manache Shlok Hindi</a>
    </div>
</div>

<!-- HEADER -->
<header>
    <div class="header-flex">

        <img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png"
             class="header-logo">

        <div class="header-text">
            <div class="site-title-main">
                Namo Narayanaya Bhakthi Channel
            </div>
            <div class="site-title-sub">
                Dasabodha Grantha Telugu Lyrics
            </div>
        </div>

    </div>
</header>

<!-- CONTENT -->
<div class="container">
    <div class="post-title" id="postTitle">Loading...</div>
    <div class="post-content" id="postContent">
        <div style="text-align:center;">Loading content...</div>
    </div>
</div>

<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<!-- SCRIPT -->
<script>
const repoName = "Dasabodha";
const mainHome = "https://dasabodha.omnnbc.in/";

const path = window.location.pathname;
const segments = path.split('/').filter(p => p && p !== repoName);
const slug = segments.pop();

const isCustomDomain = window.location.hostname.includes("omnnbc.in");
const fetchBase = isCustomDomain ? "" : `/${repoName}`;

if (!slug || slug === repoName) {
    document.getElementById("postTitle").innerText = "Welcome";
    document.getElementById("postContent").innerHTML =
    `<p style='text-align:center;'>Go to <a href="${mainHome}">Home Page</a></p>`;
}
else {
    fetch(`${fetchBase}/pages/${slug}.html`)
    .then(res => {
        if(res.ok){
            return res.text().then(html => {
                const temp = document.createElement("div");
                temp.innerHTML = html;

                temp.querySelectorAll("header,footer,nav,script,style,meta,title")
                    .forEach(e => e.remove());

                const titleText = slug.replace(/-/g," ");

                document.title = titleText;
                document.getElementById("postTitle").innerText = titleText;
                document.getElementById("postContent").innerHTML = temp.innerHTML;
            });
        }
        throw new Error("Not page");
    })
    .catch(() => {
        fetch(`${fetchBase}/data/posts.json?v=${Date.now()}`)
        .then(r => r.json())
        .then(posts => {
            const post = posts.find(p => p.url === slug);

            if(post){
                document.title = post.title;
                document.getElementById("postTitle").innerText = post.title;

                fetch(`${fetchBase}/${slug}.html`)
                .then(res => {
                    if(!res.ok) return fetch(`${fetchBase}/posts/${slug}.html`);
                    return res;
                })
                .then(r => {
                    if (!r.ok) throw new Error("Not found");
                    return r.text();
                })
                .then(html => {
                    const temp = document.createElement("div");
                    temp.innerHTML = html;

                    temp.querySelectorAll("header,footer,nav,script,style,meta,title")
                        .forEach(e => e.remove());

                    document.getElementById("postContent").innerHTML = temp.innerHTML;
                })
                .catch(() => show404());
            } else {
                show404();
            }
        })
        .catch(() => show404());
    });
}

function show404(){
    document.title = "404";
    document.getElementById("postTitle").innerText = "404 - Page Not Found";
    document.getElementById("postContent").innerHTML =
    `<div style="text-align:center;">
        <p>This page is not available.</p>
        <a href="${mainHome}" style="color:#3FA3A1;font-weight:bold;">Go to Home</a>
     </div>`;
}
</script>

</body>
</html>
