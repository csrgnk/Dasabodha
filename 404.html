<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Loading...</title>
    <script type="text/javascript">
        (function() {
            // Get the last part of the URL (the slug)
            var segment = window.location.pathname.split('/').filter(Boolean).pop();
            
            if (segment) {
                // List of fixed pages to check in /pages/ folder
                var fixedPages = ["about-us", "contact-us", "privacy-policy"];
                
                if (fixedPages.includes(segment)) {
                    // Redirect to pages folder
                    window.location.replace("/pages/" + segment + ".html");
                } else {
                    // Assume it is a post and redirect to posts folder
                    window.location.replace("/posts/" + segment + ".html");
                }
            } else {
                window.location.replace("/");
            }
        })();
    </script>
</head>
<body>
    <div style="text-align:center; margin-top:50px; font-family: sans-serif;">
        <h2>🙏 Loading Samasam Lyrics...</h2>
    </div>
</body>
</html>
