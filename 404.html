<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#922B21;
    --secondary:#1C2833;
    --accent:#D4AC0D;
    --bg:#F9F7F2;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    min-height:100vh;
    text-align:center;
}

header{
    background:#fff;
    padding:30px 15px;
    border-bottom:3px solid var(--accent);
}

.site-title-main{
    font-family:'Crimson Text',serif;
    font-size:1.8rem;
    color:var(--primary);
    font-weight:700;
}

.site-title-sub{
    font-size:0.9rem;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--secondary);
}

.container{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.error-box{
    background:#fff;
    padding:30px;
    border-radius:12px;
    max-width:500px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.error-code{
    font-size:3rem;
    font-weight:bold;
    color:var(--primary);
}

.error-text{
    margin:15px 0;
    font-size:1.1rem;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 20px;
    background:var(--primary);
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}

footer{
    background:var(--primary);
    color:#fff;
    padding:20px;
    font-size:0.85rem;
}
</style>
</head>

<body>

<header>
    <div class="site-title-main">Namo Narayanaya</div>
    <div class="site-title-sub">Bhakthi Channel</div>
</header>

<div class="container">
    <div class="error-box">
        <div class="error-code">404</div>
        <div class="error-text">
            The page you are looking for is not available.<br>
            Redirecting or try Home page.
        </div>

        <a href="https://dasabodha.omnnbc.in/" class="btn">Go to Home</a>
    </div>
</div>

<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>
const repoName = "Dasabodha";
const path = window.location.pathname;
const segments = path.split('/').filter(p => p && p !== repoName);
const slug = segments.pop();

const isCustomDomain = window.location.hostname.includes("omnnbc.in");
const fetchBase = isCustomDomain ? "" : `/${repoName}`;

// 🔥 Try PAGES first
fetch(`${fetchBase}/pages/${slug}.html`)
.then(res=>{
    if(res.ok){
        window.location.href = `${fetchBase}/pages/${slug}.html`;
    } else {
        throw new Error("Not page");
    }
})

// 🔥 Then POSTS
.catch(()=>{
    fetch(`${fetchBase}/data/posts.json`)
    .then(r=>r.json())
    .then(posts=>{
        const post = posts.find(p=>p.url===slug);
        if(post){
            window.location.href = `${fetchBase}/${slug}`;
        }
    });
});
</script>

</body>
</html>
