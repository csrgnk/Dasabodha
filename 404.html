<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Namo Narayanaya</title>
    
    <style>
        :root {
            --primary: #D35400;      /* Orange Button */
            --nav-bg: #5D4037;       /* Brown Menu */
            --bg: #FFF9E1;           /* Light Yellow Background */
            --accent: #FFD700;       /* Gold Accent */
            --site-pink: #E91E63;    /* Pink Site Title */
            --text-main: #212121;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* NAV SCROLL - BROWN */
        .nav-scroll { 
            background: var(--nav-bg); 
            display: flex; 
            overflow-x: auto; 
            padding: 10px; 
        }
        .nav-scroll a { 
            color: #fff; 
            text-decoration: none; 
            padding: 8px 12px; 
            margin: 0 4px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 4px; 
            white-space: nowrap; 
            font-size: 14px; 
            font-weight: bold; 
        }

        /* HEADER - SITE NAME PINK */
        .site-header { 
            background: #fff; 
            padding: 15px; 
            border-bottom: 4px solid var(--accent); 
            text-align: center;
        }
        .site-brand { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
        }
        .logo { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid var(--site-pink); 
        }
        .title-wrap { 
            color: var(--site-pink); 
            font-weight: 700; 
            line-height: 1.2; 
            text-align: left; 
        }
        .title-line1 { font-size: 1.5rem; display: block; }
        .title-line2 { font-size: 1.25rem; display: block; }

        /* 404 CONTENT */
        .container { 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-card {
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid #FFE082;
        }
        .error-code {
            font-size: 80px;
            font-weight: 900;
            color: var(--primary);
            margin: 0;
        }
        .error-msg {
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0 20px;
        }
        .error-desc {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* BUTTON */
        .btn-home { 
            display: inline-block;
            padding: 15px 30px; 
            background: var(--primary); 
            color: #fff; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            transition: transform 0.2s;
        }
        .btn-home:hover {
            transform: scale(1.05);
        }

        footer { 
            background: var(--nav-bg); 
            color: #fff; 
            text-align: center; 
            padding: 25px; 
            font-size: 14px; 
            border-top: 4px solid var(--accent); 
        }
    </style>
</head>
<body>

<nav class="nav-scroll">
    <a href="/">Home</a>
    <a href="https://omnnbc.com/">Main Site</a>
</nav>

<header class="site-header">
    <div class="site-brand">
        <img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="logo" alt="Logo">
        <div class="title-wrap">
            <span class="title-line1">Namo Narayanaya</span>
            <span class="title-line2">Bhakthi Channel</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="error-card">
        <h1 class="error-code">404</h1>
        <div class="error-msg">Oops! Page Not Found</div>
        <p class="error-desc">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="/" class="btn-home">GO TO HOMEPAGE</a>
    </div>
</div>

<footer>
    © 2026 Namo Narayanaya Bhakthi Channel
</footer>

</body>
</html>
