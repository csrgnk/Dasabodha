<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namo Narayanaya Bhakthi Channel</title>
    
    <script type="text/javascript">
        document.addEventListener('contextmenu', e => e.preventDefault(), false);
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && ['c', 'u', 's', 'a', 'p'].includes(e.key)) e.preventDefault();
        }, false);
        document.onselectstart = () => false;
    </script>

    <style>
        :root {
            --primary: #D35400;      /* Orange */
            --nav-bg: #5D4037;       /* Brown */
            --bg: #FFF9E1;           /* Light Yellow */
            --accent: #FFD700;       /* Gold */
            --site-pink: #E91E63;    /* Pink */
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); -webkit-user-select: none; user-select: none; }

        /* TOP NAV */
        .nav-scroll { background: var(--nav-bg); display: flex; overflow-x: auto; padding: 10px; scrollbar-width: none; }
        .nav-scroll a { color: #fff; text-decoration: none; padding: 8px 12px; margin: 0 4px; background: rgba(255,255,255,0.1); border-radius: 4px; white-space: nowrap; font-size: 14px; font-weight: bold; }

        /* HEADER */
        .site-header { background: #fff; padding: 15px; border-bottom: 4px solid var(--accent); }
        .site-brand { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--site-pink); }
        .title-wrap { color: var(--site-pink); font-weight: 700; line-height: 1.2; }
        .title-line1 { font-size: 1.5rem; display: block; }
        .title-line2 { font-size: 1.25rem; display: block; }

        /* CONTENT - LARGE TEXT */
        .container { max-width: 800px; margin: 10px auto; padding: 0 15px; }
        .post-title { background: linear-gradient(135deg, #D35400, #E67E22); color: #fff; padding: 18px; text-align: center; border-radius: 10px; font-size: 24px; font-weight: bold; }
        .post-content { background: #fff; padding: 25px; border-radius: 10px; line-height: 1.8; font-size: 22px; color: #222; border: 1px solid #FFE082; }

        /* SMALL SHARE BUTTONS */
        .share-box { margin-top: 25px; padding: 15px; border-top: 1px solid #eee; text-align: center; font-size: 14px; }
        .share-grid { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
        .share-btn { padding: 8px 12px; color: #fff; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }

        /* SMALL NAVIGATION BUTTONS */
        .post-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 25px; }
        .btn-action, .btn-home { padding: 10px; text-align: center; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .btn-action { background: var(--primary); color: #fff; }
        .btn-home { border: 2px solid var(--primary); color: var(--primary); background: #fff; }

        footer { background: var(--nav-bg); color: #fff; text-align: center; padding: 20px; margin-top: 40px; font-size: 14px; }
    </style>
</head>

<body>

<nav class="nav-scroll">
    <a href="/">Home</a>
    <a href="https://omnnbc.com/">Main Site</a>
</nav>

<header class="site-header">
    <div class="site-brand">
        <img src="https://omnnbc.com/assets/images/Omnnbc-new.png" class="logo" alt="Logo">
        <div class="title-wrap">
            <span class="title-line1">Namo Narayanaya</span>
            <span class="title-line2">Bhakthi Channel</span>
        </div>
    </div>
</header>

<div class="container">
    <div id="breadcrumb" style="padding:10px 0; font-size:12px; color:#666;"></div>
    <h1 id="postTitle" class="post-title">Loading...</h1>
    <div id="postContent" class="post-content">Loading...</div>
</div>

<script>
    const mainHome = window.location.origin + "/";
    const path = window.location.pathname.replace(/\/$/, ""); 
    const pathParts = path.split('/').filter(Boolean);
    let slug = pathParts[pathParts.length - 1] || "index";

    function buildNav(posts, i) {
        // Strict 1-post logic
        // Left Button links to i+1, Right Button links to i-1
        let prevPost = posts[i + 1]; 
        let nextPost = posts[i - 1]; 

        return `<div class="post-nav">
            ${prevPost ? `<a href="${mainHome}${prevPost.url}/" class="btn-action">← Prev</a>` : `<div></div>`}
            <a href="${mainHome}" class="btn-home">HOME</a>
            ${nextPost ? `<a href="${mainHome}${nextPost.url}/" class="btn-action">Next →</a>` : `<div></div>`}
        </div>`;
    }

    function shareButtons(title) {
        let url = location.href;
        let text = encodeURIComponent(title + " - " + url);
        return `
        <div class="share-box">
            <b>Share this Content</b>
            <div class="share-grid">
                <a class="share-btn" href="https://wa.me/?text=${text}" target="_blank" style="background:#25D366;">WhatsApp</a>
                <a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${url}" target="_blank" style="background:#1877F2;">Facebook</a>
                <button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href);alert('Copied!')" style="background:#555;">Copy</button>
            </div>
        </div>`;
    }

    Promise.all([
        fetch(`${mainHome}data/posts.json?v=${new Date().getTime()}`).then(r => r.json()),
        fetch(`${mainHome}data/pages.json?v=${new Date().getTime()}`).then(r => r.json()).catch(() => [])
    ])
    .then(([posts, pages]) => {
        let i = posts.findIndex(p => p.url === slug);
        let post = posts[i];

        if (post) {
            document.title = post.title;
            document.getElementById("postTitle").innerText = post.title;

            fetch(`${mainHome}posts/${slug}.html`)
                .then(r => r.text())
                .then(html => {
                    let temp = document.createElement("div");
                    temp.innerHTML = html;
                    temp.querySelectorAll("header,footer,nav,script,style").forEach(e => e.remove());
                    document.getElementById("postContent").innerHTML = temp.innerHTML + shareButtons(post.title) + buildNav(posts, i);
                });
        }
    });
</script>

<footer>© 2026 Namo Narayanaya Bhakthi Channel</footer>
</body>
</html>
