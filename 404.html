<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Namo Narayanaya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #3FA3A1;
            --secondary: #1A1A1A;
            --accent: #F4D03F;
            --bg: #F4FBFB;
            --nav-bg: #145A5A;
        }

        /* Prevent the whole page from shaking/sliding left-right */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden; 
            font-family: 'Inter', sans-serif;
            background: var(--bg);
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* FIXED: Scrolling Nav restricted to screen width */
        .nav-container {
            background: var(--nav-bg);
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            padding: 12px 0;
            -webkit-overflow-scrolling: touch; /* Smooth scroll on iPhone */
        }
        .nav-container::-webkit-scrollbar { display: none; }

        .nav-container a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 16px;
            margin-left: 10px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            flex-shrink: 0; /* Prevents text from squishing */
        }
        .nav-container a:last-child { margin-right: 15px; }

        /* HEADER */
        header { 
            background: #fff; 
            padding: 20px 10px; 
            border-bottom: 3px solid var(--accent);
            text-align: center;
        }
        .header-flex { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header-logo { width: 55px; height: 55px; border-radius: 50%; flex-shrink: 0; }
        .site-title-main { font-family: 'Crimson Text', serif; font-size: 1.3rem; font-weight: 700; color: #E91E63; margin: 0; line-height: 1.2; }

        /* CONTENT CONTAINER */
        .container { 
            max-width: 800px; 
            margin: 15px auto; 
            padding: 0 12px; 
            width: 100%; 
            box-sizing: border-box; 
        }

        .post-title { 
            background: linear-gradient(135deg, #2E8B87, #3FA3A1); 
            color: #fff; 
            text-align: center; 
            padding: 15px 10px; 
            font-size: 1.2rem; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            word-wrap: break-word;
        }

        .post-content { 
            background: #fff; 
            padding: 20px; 
            border-radius: 10px; 
            font-size: 18px; 
            line-height: 1.7; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            overflow-wrap: break-word; /* Prevents long Telugu words from breaking layout */
        }

        /* FIXED: Navigation Buttons (Prev/Next) */
        .post-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 1px solid #ddd; 
            gap: 8px;
            flex-wrap: nowrap; /* Keep on one line but adjust font */
        }

        .btn-action { 
            background: var(--primary); 
            color: #fff !important; 
            padding: 10px 12px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 13px; 
            text-align: center;
            flex: 1; /* Make buttons equal width */
            max-width: 120px;
        }

        .btn-home-outline { 
            border: 2px solid var(--primary); 
            color: var(--primary); 
            padding: 8px 12px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 12px;
            text-align: center;
        }

        footer { background: #2E8B87; color: #fff; text-align: center; padding: 20px; font-size: 0.8rem; margin-top: auto; }
    </style>
</head>
<body>

<nav class="nav-container">
    <a href="https://dasabodha.omnnbc.in/">Home</a>
    <a href="https://csrgnk.github.io/Omnnbc/">Main Site</a>
    <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
    <a href="https://csrgnk.github.io/manache-shlok/">Manache Shlok Telugu</a>
    <a href="https://csrgnk.github.io/manache-shlok/hindi/">Manache Shlok Hindi</a>
    <a href="/about-us">About Us</a>
</nav>

<header>
    <div class="header-flex">
        <img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png" class="header-logo" alt="Logo">
        <div>
            <div class="site-title-main">Namo Narayanaya Bhakthi Channel</div>
        </div>
    </div>
</header>

<div class="container">
    <div class="post-title" id="postTitle">Loading...</div>
    <div class="post-content" id="postContent">
        <div style="text-align:center;">Loading content...</div>
    </div>
</div>

<footer>© 2026 Namo Narayanaya Bhakthi Channel</footer>

<script>
const repoName = "Dasabodha";
const mainHome = "https://dasabodha.omnnbc.in/";
const path = window.location.pathname;
const segments = path.split('/').filter(p => p && p !== repoName);
const slug = segments.pop();
const isCustomDomain = window.location.hostname.includes("omnnbc.in");
const fetchBase = isCustomDomain ? "" : `/${repoName}`;

function getNavHtml(posts, index) {
    const prev = posts[index - 1];
    const next = posts[index + 1];
    let html = `<div class="post-nav">`;
    html += prev ? `<a href="${fetchBase}/${prev.url}" class="btn-action">← Prev</a>` : `<div style="flex:1"></div>`;
    html += `<a href="${mainHome}" class="btn-home-outline">HOME</a>`;
    html += next ? `<a href="${fetchBase}/${next.url}" class="btn-action">Next →</a>` : `<div style="flex:1"></div>`;
    html += `</div>`;
    return html;
}

// Logic to fetch posts.json and content
fetch(`${fetchBase}/data/posts.json?v=${Date.now()}`)
.then(r => r.json())
.then(posts => {
    const index = posts.findIndex(p => p.url === slug);
    const post = posts[index];

    if (post) {
        document.title = post.title;
        document.getElementById("postTitle").innerText = post.title;

        // Auto Setup Meta Tags from JSON
        let desc = document.querySelector('meta[name="description"]');
        if(desc) desc.content = post.description || post.title;

        fetch(`${fetchBase}/posts/${slug}.html`)
        .then(res => res.text())
        .then(html => {
            const temp = document.createElement("div");
            temp.innerHTML = html;
            temp.querySelectorAll("header,footer,nav,script,style,meta,title").forEach(e => e.remove());
            document.getElementById("postContent").innerHTML = temp.innerHTML + getNavHtml(posts, index);
        });
    }
});
</script>

</body>
</html>
