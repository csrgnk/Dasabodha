<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="pageTitle">Loading...</title>

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#922B21;
    --secondary:#1C2833;
    --accent:#D4AC0D;
    --bg:#F9F7F2;
    --top-links-bg:#1B2631;
    --outer-links-bg:#7B241C;
}

body{
margin:0;
padding-top:90px;
font-family:'Inter',sans-serif;
background:var(--bg);
display:flex;
flex-direction:column;
min-height:100vh;
overflow-x:hidden;
}

/* NAV */
.fixed-nav-wrapper{
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.top-links{
background:var(--top-links-bg);
display:flex;
justify-content:center;
gap:10px;
padding:8px 5px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.outer-links{
background:var(--outer-links-bg);
display:flex;
overflow-x:auto;
white-space:nowrap;
padding:10px 15px;
gap:18px;
scrollbar-width:none;
}
.outer-links::-webkit-scrollbar{display:none;}

.fixed-nav-wrapper a{
color:#fff;
text-decoration:none;
font-size:0.7rem;
font-weight:600;
text-transform:uppercase;
}

/* HEADER */
header{
background:#fff;
padding:30px 10px;
text-align:center;
border-bottom:3px solid var(--accent);
}

.site-title-main{
font-family:'Crimson Text',serif;
font-size:1.9rem;
font-weight:700;
color:var(--primary);
}

.site-title-sub{
font-size:0.95rem;
font-weight:700;
letter-spacing:3px;
text-transform:uppercase;
color:var(--secondary);
}

/* CONTENT */
.container{
max-width:800px;
margin:auto;
padding:20px 15px;
flex:1;
}

.post-title{
background:var(--primary);
color:#fff;
text-align:center;
padding:12px;
font-size:1.6rem;
border-radius:12px;
margin-bottom:15px;
font-family:'Crimson Text',serif;
}

.post-content{
background:#fff;
padding:25px;
border-radius:12px;
font-size:20px;
line-height:1.8;
}

/* SHARE */
.share-row{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:25px;
}

.share-btn{
padding:12px;
border-radius:8px;
color:#fff;
font-size:12px;
flex:1;
text-align:center;
text-decoration:none;
}

.wa{background:#25D366;}
.fb{background:#1877F2;}
.tw{background:#000;}
.cp{background:#607D8B;border:none;}

.back-home{text-align:center;margin:30px 0;}
.back-home a{color:var(--primary);font-weight:bold;text-decoration:none;}

footer{
background:var(--primary);
color:#fff;
text-align:center;
padding:25px;
}
</style>
</head>

<body>

<!-- ✅ FIXED LINKS ONLY -->
<div class="fixed-nav-wrapper">
    <div class="top-links">
        <a href="/Dasabodha/">Home</a>
        <a href="/Dasabodha/pages/about-us.html">About Us</a>
        <a href="/Dasabodha/pages/contact-us.html">Contact Us</a>
        <a href="/Dasabodha/pages/privacy-policy.html">Privacy Policy</a>
    </div>

    <div class="outer-links">
        <a href="https://omnnbc.in/">Omnnbc</a>
        <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
        <a href="https://csrgnk.github.io/manache-shlok/">Manache Shlok Telugu</a>
        <a href="https://csrgnk.github.io/manache-shlok/hindi/">Manache Shlok Hindi</a>
    </div>
</div>

<header>
    <div class="site-title-main">Namo Narayanaya</div>
    <div class="site-title-sub">Bhakthi Channel</div>
</header>

<div class="container">
    <div class="post-title" id="postTitle">Loading...</div>
    <div class="post-content" id="postContent">Loading...</div>

    <div class="share-row" id="shareRow" style="display:none;">
        <a id="sWA" class="share-btn wa" target="_blank">WhatsApp</a>
        <a id="sFB" class="share-btn fb" target="_blank">Facebook</a>
        <a id="sTW" class="share-btn tw" target="_blank">Twitter</a>
        <button onclick="copyURL()" class="share-btn cp">Copy Link</button>
    </div>

    <div class="back-home">
        <a href="/Dasabodha/">← Back to Home</a>
    </div>
</div>

<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>
const repoName="Dasabodha";
const isGitHub=window.location.hostname.includes("github.io");
const sitePath=window.location.pathname;

let pathSegments=sitePath.split('/').filter(p=>p && p!==repoName);
let slug=pathSegments.pop();

const fetchBase=isGitHub?`/${repoName}`:"";

function copyURL(){
navigator.clipboard.writeText(window.location.href);
alert("Link Copied!");
}

if(!slug||slug===repoName){
document.getElementById("postTitle").innerText="Information";
document.getElementById("postContent").innerHTML="<p style='text-align:center;'>Select from home page</p>";
}else{
fetch(`${fetchBase}/data/posts.json?v=${Date.now()}`)
.then(r=>r.json())
.then(posts=>{
const post=posts.find(p=>p.url===slug);

if(post){
document.title=post.title;
document.getElementById("postTitle").innerText=post.title;

fetch(`${fetchBase}/posts/${slug}.html`)
.then(r=>r.text())
.then(html=>{
const temp=document.createElement("div");
temp.innerHTML=html;
temp.querySelectorAll("header,footer,nav,script,style").forEach(e=>e.remove());

document.getElementById("postContent").innerHTML=temp.innerHTML;

const u=encodeURIComponent(window.location.href);
const m=encodeURIComponent(post.title+"\n\n");

sWA.href=`https://api.whatsapp.com/send?text=${m}${u}`;
sFB.href=`https://www.facebook.com/sharer/sharer.php?u=${u}`;
sTW.href=`https://twitter.com/intent/tweet?text=${m}&url=${u}`;

document.getElementById("shareRow").style.display="flex";
});
}
});
}
</script>

</body>
</html>
