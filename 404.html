<!DOCTYPE html>
<html lang="te">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loading...</title>

<style>

body{
margin:0;
font-family:'Segoe UI',Arial,sans-serif;
background:#f4f6f9;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* HEADER */

header{
background:#FFF3E0;
padding:20px;
text-align:center;
font-size:1.6rem;
font-weight:bold;
color:#E65100;
border-bottom:3px solid #FF9800;
}

/* CONTAINER */

.container{
max-width:800px;
margin:auto;
padding:15px;
flex:1;
}

/* TITLE */

.post-title{
background:linear-gradient(135deg,#FF9800,#E65100);
color:#fff;
text-align:center;
padding:15px;
font-size:1.4rem;
font-weight:bold;
border-radius:15px;
margin-bottom:10px;
}

/* CONTENT */

.post-content{
background:#FFFDE7;
padding:20px;
border-radius:12px;
color:#2E3A59;
line-height:1.7;
}

/* BACK */

.back-home{
text-align:center;
margin-top:20px;
}

.back-home a{
color:#E65100;
font-weight:bold;
text-decoration:none;
}

/* FOOTER */

footer{
background:#E65100;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>Namo Narayanaya Bhakthi Channel</header>

<div class="container">

<div class="post-title" id="postTitle">Loading...</div>

<div class="post-content" id="postContent">
Please wait...
</div>

<div class="back-home">
<a href="/">← Back to Home</a>
</div>

</div>

<footer>
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

<script>

/* GET SLUG */
const path = window.location.pathname;
const slug = path.replace(/^\/+|\/+$/g,'');

/* FETCH POSTS JSON */

fetch("./data/posts.json")
.then(r=>r.json())
.then(posts=>{

const post = posts.find(p => p.url === slug);

if(post){

document.title = post.title;

document.getElementById("postTitle").innerText = post.title;

/* LOAD ACTUAL HTML FILE */
fetch(`./posts/${slug}.html`)
.then(r=>r.text())
.then(html=>{

const temp=document.createElement("div");
temp.innerHTML=html;

/* REMOVE HEADER/FOOTER FROM POST */
const remove=temp.querySelectorAll("header,footer,nav,script,style");
remove.forEach(e=>e.remove());

document.getElementById("postContent").innerHTML=temp.innerHTML;

});

}else{

document.getElementById("postTitle").innerText="Page Not Found";

document.getElementById("postContent").innerHTML="Content not available.";

}

});

</script>

</body>
</html>
