<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Namo Narayanaya</title>
    
    <meta name="description" content="Namo Narayanaya Bhakthi Channel - Dasabodha Telugu Lyrics">
    <meta name="keywords" content="Dasabodha, Telugu, Bhakthi, Namo Narayanaya">

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #3FA3A1;
            --secondary: #1A1A1A;
            --accent: #F4D03F;
            --bg: #F4FBFB;
            --nav-bg: #145A5A;
        }

        body {
            margin: 0;
            padding: 0; /* Removed padding-top since nav is no longer sticky */
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* SINGLE LINE SCROLLABLE NAV */
        .nav-container {
            background: var(--nav-bg);
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            padding: 12px 5px;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE 10+ */
        }
        .nav-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .nav-container a {
            color: #fff;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 15px;
            margin: 0 5px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        /* HEADER (Non-Sticky) */
        header { 
            background: #fff; 
            padding: 20px 10px; 
            border-bottom: 3px solid var(--accent); 
        }
        .header-flex { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .header-logo { width: 65px; height: 65px; border-radius: 50%; }
        .site-title-main { font-family: 'Crimson Text', serif; font-size: 1.5rem; font-weight: 700; color: #E91E63; margin: 0; }
        .site-title-sub { font-size: 0.8rem; color: var(--secondary); margin-top: 4px; display: block; }

        /* CONTENT */
        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; flex: 1; width: 100%; box-sizing: border-box; }
        .post-title { background: linear-gradient(135deg, #2E8B87, #3FA3A1); color: #fff; text-align: center; padding: 15px; font-size: 1.4rem; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .post-content { background: #fff; padding: 25px; border-radius: 12px; font-size: 19px; line-height: 1.8; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* NAVIGATION BUTTONS (Prev/Home/Next) */
        .post-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 35px; padding-top: 25px; border-top: 2px solid #f0f0f0; gap: 10px; }
        .btn-action { background: var(--primary); color: #fff !important; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; min-width: 80px; text-align: center; }
        .btn-home-outline { border: 2px solid var(--primary); color: var(--primary); padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 13px; }

        footer { background: #2E8B87; color: #fff; text-align: center; padding: 25px; font-size: 0.9rem; margin-top: 50px; }
    </style>
</head>
<body>

<nav class="nav-container">
    <a href="https://dasabodha.omnnbc.in/">Home</a>
    <a href="https://csrgnk.github.io/Omnnbc/">Main Site</a>
    <a href="https://csrgnk.github.io/Upasana-Chandrika/">Upasana Chandrika</a>
    <a href="https://csrgnk.github.io/manache-shlok/">Manache Shlok Telugu</a>
    <a href="https://csrgnk.github.io/manache-shlok/hindi/">Manache Shlok Hindi</a>
    <a href="/about-us">About Us</a>
    <a href="/contact-us">Contact Us</a>
    <a href="/privacy-policy">Privacy Policy</a>
</nav>

<header>
    <div class="header-flex">
        <img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png" class="header-logo" alt="Logo">
        <div>
            <div class="site-title-main">Namo Narayanaya Bhakthi Channel</div>
            <span class="site-title-sub">Dasabodha Grantha Telugu Lyrics</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="post-title" id="postTitle">Loading...</div>
    <div class="post-content" id="postContent">
        <div style="text-align:center; color: #666;">Searching for content...</div>
    </div>
</div>

<footer>© 2026 Namo Narayanaya Bhakthi Channel</footer>

<script>
const repoName = "Dasabodha";
const mainHome = "https://dasabodha.omnnbc.in/";
const path = window.location.pathname;
const segments = path.split('/').filter(p => p && p !== repoName);
const slug = segments.pop();
const isCustomDomain = window.location.hostname.includes("omnnbc.in");
const fetchBase = isCustomDomain ? "" : `/${repoName}`;

function updateSEO(post) {
    if(!post) return;
    document.title = post.title;
    document.querySelector('meta[name="description"]')?.setAttribute("content", post.description || post.title);
    document.querySelector('meta[name="keywords"]')?.setAttribute("content", post.keywords || "Dasabodha, Telugu, Bhakthi");
}

function getNavHtml(posts, index) {
    const prev = posts[index - 1];
    const next = posts[index + 1];
    let html = `<div class="post-nav">`;
    html += prev ? `<a href="${fetchBase}/${prev.url}" class="btn-action">← Previous</a>` : `<span></span>`;
    html += `<a href="${mainHome}" class="btn-home-outline">Home</a>`;
    html += next ? `<a href="${fetchBase}/${next.url}" class="btn-action">Next →</a>` : `<span></span>`;
    html += `</div>`;
    return html;
}

if (!slug || slug === "index.html") {
    window.location.href = mainHome;
} else {
    fetch(`${fetchBase}/data/posts.json?v=${Date.now()}`)
    .then(r => r.json())
    .then(posts => {
        const index = posts.findIndex(p => p.url === slug);
        const post = posts[index];

        if (post) {
            updateSEO(post);
            document.getElementById("postTitle").innerText = post.title;

            fetch(`${fetchBase}/posts/${slug}.html`)
            .then(res => res.ok ? res.text() : Promise.reject())
            .then(html => {
                const temp = document.createElement("div");
                temp.innerHTML = html;
                temp.querySelectorAll("header,footer,nav,script,style,meta,title").forEach(e => e.remove());
                document.getElementById("postContent").innerHTML = temp.innerHTML + getNavHtml(posts, index);
            })
            .catch(() => show404());
        } else {
            show404();
        }
    })
    .catch(() => show404());
}

function show404() {
    document.title = "404 - Not Found";
    document.getElementById("postTitle").innerText = "Page Not Found";
    document.getElementById("postContent").innerHTML = `<div style="text-align:center; padding:30px;"><p>Sorry, this content is not available.</p><a href="${mainHome}" class="btn-home-outline">Back Home</a></div>`;
}
</script>
</body>
</html>
