<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Loading...</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #f4f6f9; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }

        /* HEADER - Scrolling style */
        header { 
            background: #FFFDE7; 
            padding: 20px 10px; 
            text-align: center; 
            color: #C2185B; 
            border-bottom: 3px solid #FFD700; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-weight: bold; 
            font-size: 1.8rem;
            line-height: 1.2;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .container { 
            max-width: 800px; 
            margin: auto; 
            padding: 15px; 
            flex: 1; 
            width: 100%; 
            box-sizing: border-box; 
        }

        /* POST TITLE - Height Reduced to 12px padding, Text Size Kept Big */
        .post-title { 
            background: #C2185B; 
            color: white; 
            text-align: center; 
            padding: 12px 15px; /* Set to 12px as requested */
            font-size: 1.6rem;   /* Keeping the same big text size */
            font-weight: bold; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            word-wrap: break-word;
            line-height: 1.2;
        }

        .post-content { 
            background: #FFFDE7; 
            padding: 20px; 
            border-radius: 12px; 
            color: #1A237E; 
            line-height: 1.8; 
            font-size: 20px; 
            word-wrap: break-word;
        }

        .post-content img { max-width: 100%; height: auto; border-radius: 8px; }

        .share-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .share-btn { padding: 10px 12px; border-radius: 8px; color: white; font-weight: bold; text-decoration: none; font-size: 13px; flex: 1; min-width: 90px; text-align: center; }
        .wa { background: #25D366; } .fb { background: #1877F2; } .tw { background: #000; } .cp { background: #607D8B; border: none; cursor: pointer; }
        
        .back-home { text-align: center; margin: 25px 0; }
        .back-home a { color: #C2185B; font-weight: bold; text-decoration: none; font-size: 17px; }
        
        footer { background: #C2185B; color: white; text-align: center; padding: 20px; margin-top: auto; }

        @media (max-width: 600px) {
            header { font-size: 1.45rem; }
            /* Keeping text size 1.4rem on mobile for better visibility */
            .post-title { font-size: 1.4rem; padding: 12px 10px; } 
            .post-content { font-size: 19px; }
        }
    </style>
</head>
<body>

<header>
    <div>Namo Narayanaya</div>
    <div>Bhakthi Channel</div>
</header>

<div class="container">
    <div class="post-title" id="postTitle">Loading...</div>
    <div class="post-content" id="postContent"></div>

    <div class="share-row" id="shareRow" style="display:none;">
        <a id="sWA" class="share-btn wa" target="_blank">WhatsApp</a>
        <a id="sFB" class="share-btn fb" target="_blank">Facebook</a>
        <a id="sTW" class="share-btn tw" target="_blank">Twitter</a>
        <button onclick="copyURL()" class="share-btn cp">Copy URL</button>
    </div>

    <div class="back-home">
        <a href="/">← Back to Home</a>
    </div>
</div>

<footer>
    <p>© 2026 Namo Narayanaya Bhakthi Channel</p>
</footer>

<script>
    const repoName = "Omnnbc"; 
    const isGitHub = window.location.hostname.includes("github.io");
    const baseUrl = isGitHub ? `/${repoName}` : "";

    // Auto-clean URL address bar
    if (window.location.pathname.includes("/" + repoName + "/")) {
        const cleanPath = window.location.pathname.replace("/" + repoName + "/", "/");
        window.history.replaceState(null, "", cleanPath);
    }

    let path = window.location.pathname;
    let slug = path.split('/').filter(p => p && p !== repoName).pop();

    function copyURL(){
        navigator.clipboard.writeText(window.location.href);
        alert("Link Copied!");
    }

    fetch(`${baseUrl}/data/posts.json`)
    .then(r => r.json())
    .then(posts => {
        const post = posts.find(p => p.url === slug);

        if(post) {
            document.title = post.title + " - Namo Narayanaya";
            document.getElementById("postTitle").innerText = post.title;

            fetch(`${baseUrl}/posts/${slug}.html`)
            .then(r => r.text())
            .then(html => {
                const temp = document.createElement("div");
                temp.innerHTML = html;
                const extras = temp.querySelectorAll("header,footer,nav,script,style");
                extras.forEach(e => e.remove());

                document.getElementById("postContent").innerHTML = temp.innerHTML;

                const u = encodeURIComponent(window.location.href);
                const m = encodeURIComponent(post.title + "\n\n");
                document.getElementById("sWA").href = `https://api.whatsapp.com/send?text=${m}${u}`;
                document.getElementById("sFB").href = `https://www.facebook.com/sharer/sharer.php?u=${u}`;
                document.getElementById("sTW").href = `https://twitter.com/intent/tweet?text=${m}&url=${u}`;
                document.getElementById("shareRow").style.display = "flex";
            });
        } else {
            document.getElementById("postTitle").innerText = "Page Not Found";
            document.getElementById("postContent").innerHTML = "<p style='text-align:center;'>Sorry, the page you are looking for does not exist.</p>";
        }
    })
    .catch(e => console.error(e));
</script>

</body>
            </html>
