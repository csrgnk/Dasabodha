<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Namo Narayanaya Bhakthi Channel</title>

<meta name="description" id="metaDesc" content="Dasabodha Telugu Lyrics">

<style>
:root{
--primary:#3FA3A1;
--nav-bg:#145A5A;
--bg:#F4FBFB;
--accent:#F4D03F;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
}

/* NAV */
.nav-scroll{
background:var(--nav-bg);
display:flex;
overflow-x:auto;
padding:10px;
}
.nav-scroll a{
color:#fff;
text-decoration:none;
padding:6px 12px;
margin:0 4px;
background:rgba(255,255,255,0.1);
border-radius:4px;
white-space:nowrap;
}

/* HEADER */
.site-header{
background:#fff;
padding:12px;
border-bottom:3px solid var(--accent);
}
.site-brand{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}
.logo { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
.title-wrap{
text-align:left;
color:#E91E63;
font-weight:700;
font-family:'Crimson Text',serif;
}
.title-line1{font-size:18px;}
.title-line2{font-size:14px;}

/* Desktop single line */
@media(min-width:768px){
.title-wrap{
display:flex;
gap:6px;
align-items:center;
}
.title-line1,.title-line2{font-size:20px;}
}

/* CONTENT */
.container{
max-width:800px;
margin:15px auto;
padding:10px;
}
.post-title{
background:linear-gradient(135deg,#2E8B87,#3FA3A1);
color:#fff;
padding:15px;
text-align:center;
border-radius:10px;
}
.post-content{
background:#fff;
padding:20px;
margin-top:15px;
border-radius:10px;
line-height:1.8;
}

/* NAV BUTTONS */
.post-nav{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
margin-top:30px;
}
.btn-action{
background:var(--primary);
color:#fff;
padding:10px;
text-align:center;
border-radius:5px;
text-decoration:none;
}
.btn-home{
border:2px solid var(--primary);
color:var(--primary);
text-align:center;
padding:10px;
border-radius:5px;
text-decoration:none;
}

/* SHARE */
.share-box{
margin-top:30px;
text-align:center;
}
.share-btn{
display:inline-block;
margin:5px;
padding:10px 12px;
background:#3FA3A1;
color:#fff;
border-radius:5px;
text-decoration:none;
border:none;
}

/* STATUS */
.status-msg{
text-align:center;
padding:40px;
}

/* FOOTER */
.site-footer{
background:#2E8B87;
color:#fff;
text-align:center;
padding:25px 10px;
margin-top:40px;
font-size:14px;
}
</style>
</head>

<body>

<nav class="nav-scroll">
<a href="https://dasabodha.omnnbc.in/">Home</a>
<a href="https://csrgnk.github.io/Omnnbc/">Main Site</a>
<a href="/about-us">About Us</a>
<a href="/contact-us">Contact Us</a>
</nav>

<!-- HEADER -->
<header class="site-header">
<div class="site-brand">
<img src="https://csrgnk.github.io/Omnnbc/assets/images/Omnnbc-new.png" class="logo">
<div class="title-wrap">
<div class="title-line1">Namo Narayanaya</div>
<div class="title-line2">Bhakthi Channel</div>
</div>
</div>
</header>

<div class="container">
<div id="postTitle" class="post-title">Loading...</div>
<div id="postContent" class="post-content">Loading...</div>
</div>

<script>
const repoName="Dasabodha";
const mainHome="https://dasabodha.omnnbc.in/";

const pathParts=location.pathname.split('/').filter(Boolean);
const slug=pathParts[pathParts.length-1] || "index";

const isCustomDomain=location.hostname.includes("omnnbc.in");
const fetchBase=isCustomDomain?"":`/${repoName}`;

/* SHARE */
function shareButtons(title){
let url=location.href;
let text=encodeURIComponent(title+" - "+url);

return `<div class="share-box">
<b>Share</b><br>
<a class="share-btn" href="https://wa.me/?text=${text}" target="_blank">WhatsApp</a>
<a class="share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${url}" target="_blank">Facebook</a>
<a class="share-btn" href="https://twitter.com/intent/tweet?text=${text}" target="_blank">Twitter</a>
<button class="share-btn" onclick="copyLink()">Copy Link</button>
</div>`;
}

function copyLink(){
navigator.clipboard.writeText(location.href);
alert("Link Copied");
}

/* NAV */
function buildNav(posts,i){
let prev=posts[i-1];
let next=posts[i+1];

return `<div class="post-nav">
${prev?`<a href="${fetchBase}/${prev.url}" class="btn-action">← Prev</a>`:`<div></div>`}
<a href="${mainHome}" class="btn-home">HOME</a>
${next?`<a href="${fetchBase}/${next.url}" class="btn-action">Next →</a>`:`<div></div>`}
</div>`;
}

/* 404 */
function showNotFound(){
document.getElementById("postTitle").innerText="Not Found";
document.getElementById("postContent").innerHTML=
`<div class="status-msg">
<h2>404 - Not Found</h2>
<a href="${mainHome}" class="btn-home">Home</a>
</div>`;
}

/* LOAD PAGE */
function loadPage(page){
fetch(`${fetchBase}/pages/${page.file}.html`)
.then(r=>r.text())
.then(html=>{
let temp=document.createElement("div");
temp.innerHTML=html;
temp.querySelectorAll("header,footer,nav,script,style").forEach(e=>e.remove());

document.getElementById("postTitle").innerText=page.title;
document.getElementById("postContent").innerHTML=temp.innerHTML+shareButtons(page.title);
});
}

/* LOAD DATA */
Promise.all([
fetch(`${fetchBase}/data/posts.json`).then(r=>r.json()),
fetch(`${fetchBase}/data/pages.json`).then(r=>r.json())
])
.then(([posts,pages])=>{

posts.forEach(p=>{
let d=p.title.match(/Dashakam\s*(\d+)/i)||p.url.match(/dashakam-(\d+)/i);
let s=p.title.match(/Samasam\s*(\d+)/i)||p.url.match(/samasam-(\d+)/i);
if(d)p.dashakam=parseInt(d[1]);
if(s)p.samasam=parseInt(s[1]);
});

posts.sort((a,b)=>{
if(a.dashakam!==b.dashakam)return a.dashakam-b.dashakam;
return a.samasam-b.samasam;
});

let i=posts.findIndex(p=>p.url===slug);
let post=posts[i];

if(post){
document.getElementById("postTitle").innerText=post.title;

fetch(`${fetchBase}/posts/${slug}.html`)
.then(r=>r.text())
.then(html=>{
let temp=document.createElement("div");
temp.innerHTML=html;
temp.querySelectorAll("header,footer,nav,script,style").forEach(e=>e.remove());

document.getElementById("postContent").innerHTML=
temp.innerHTML+
shareButtons(post.title)+
buildNav(posts,i);
});
return;
}

let page=pages.find(p=>p.id===slug);
if(page){ loadPage(page); return; }

showNotFound();

});
</script>

<footer class="site-footer">
© 2026 Namo Narayanaya Bhakthi Channel
</footer>

</body>
</html>
