<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title id="pageTitle">Loading... - Namo Narayanaya</title>
    <meta id="metaDesc" name="description" content="Dasabodha Grantha Telugu Lyrics">
    <link id="canonicalUrl" rel="canonical" href="">

    <style>
        * { box-sizing: border-box; }
        body { margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#f4f6f9; line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        
        .nav-menu { background: #C2185B; padding: 12px 5px; text-align: center; position: sticky; top: 0; z-index: 1000; white-space: nowrap; overflow-x: auto; }
        .nav-menu a { color: white; text-decoration: none; margin: 0 12px; font-weight: bold; font-size: 14px; display: inline-block; }
        
        header { background:#fff9db; padding:20px 10px; text-align:center; color:#C2185B; border-bottom: 3px solid #FFD700; }
        .header-main { font-size: 1.8rem; font-weight: bold; line-height: 1.1; }
        .header-sub { font-size: 1.7rem; font-weight: bold; }
        .header-sub-box { background: #002366; color: #ffffff; padding: 8px 25px; border-radius: 50px; font-size: 0.9rem; margin-top: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 15px; flex: 1; }
        .content-area { background:#fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; }
        #postTitle { color: #002366; text-align: center; border-bottom: 2px solid #fff9db; padding-bottom: 15px; font-size: 1.5rem; }

        /* SHARE BUTTONS STYLE */
        .share-section { margin-top: 25px; padding-top: 15px; border-top: 1px dashed #ccc; text-align: center; }
        .share-title { font-size: 14px; font-weight: bold; color: #C2185B; margin-bottom: 10px; display: block; }
        .share-grid { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .share-btn { padding: 8px 12px; border-radius: 5px; text-decoration: none; color: white; font-size: 12px; font-weight: bold; min-width: 80px; transition: 0.3s; cursor: pointer; border: none; }
        .wa-btn { background: #25D366; }
        .fb-btn { background: #1877F2; }
        .tw-btn { background: #000000; }
        .cp-btn { background: #607D8B; }

        /* NAVIGATION BUTTONS */
        .post-nav { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 20px; border-top: 2px solid #f0f0f0; gap: 8px; }
        .nav-btn { background: #002366; color: white; padding: 10px 8px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 13px; flex: 1; text-align: center; }
        .nav-btn.home-btn { background: #C2185B; }
        .nav-btn.disabled { background: #ccc; pointer-events: none; opacity: 0.5; }

        footer { background: #C2185B; color: white; text-align: center; padding: 20px; margin-top: auto; }
    </style>
</head>
<body>

<nav class="nav-menu">
    <a href="/Dasabodha/">Home</a>
    <a href="/Dasabodha/about-us">About Us</a>
</nav>

<header>
    <div class="header-main">Namo Narayanaya</div>
    <div class="header-sub">Bhakthi Channel</div>
    <div class="header-sub-box">Dasabodha Grantha Telugu Lyrics</div>
</header>

<div class="container">
    <article class="content-area">
        <h1 id="postTitle">Loading...</h1>
        <div id="postContent"></div>

        <div class="share-section" id="shareSection" style="display:none;">
            <span class="share-title">Share this Samasam:</span>
            <div class="share-grid">
                <a id="shareWA" target="_blank" class="share-btn wa-btn">WhatsApp</a>
                <a id="shareFB" target="_blank" class="share-btn fb-btn">Facebook</a>
                <a id="shareTW" target="_blank" class="share-btn tw-btn">Twitter</a>
                <button onclick="copyCurrentLink()" class="share-btn cp-btn">Copy Link</button>
            </div>
        </div>

        <div class="post-nav" id="postNav" style="display:none;">
            <a id="prevBtn" href="#" class="nav-btn">← Previous</a>
            <a href="/Dasabodha/" class="nav-btn home-btn">Home</a>
            <a id="nextBtn" href="#" class="nav-btn">Next →</a>
        </div>
    </article>
</div>

<footer><p>© 2026 Namo Narayanaya Bhakthi Channel</p></footer>

<script>
    const repo = "/Dasabodha";
    const path = window.location.pathname;
    const segments = path.split('/').filter(Boolean);
    const cleanId = segments.pop();

    function copyCurrentLink() {
        navigator.clipboard.writeText(window.location.href);
        alert("Link copied to clipboard!");
    }

    if (cleanId && cleanId !== 'Dasabodha') {
        fetch(`${repo}/data/posts.json`).then(res => res.json()).then(allPosts => {
            allPosts.sort((a, b) => {
                if (parseInt(a.dashakam) !== parseInt(b.dashakam)) return parseInt(a.dashakam) - parseInt(b.dashakam);
                const getNum = u => parseInt(u.match(/samasam-(\d+)/)[1]);
                return getNum(a.url) - getNum(b.url);
            });

            const index = allPosts.findIndex(p => p.url.includes(cleanId));
            if (index !== -1) {
                const post = allPosts[index];
                updateSEO(post.title, post.description);
                loadPostContent(`${repo}/posts/${cleanId}.html`, post.title);
                renderNavigation(allPosts, index);
                setupShareLinks(post.title);
            } else {
                loadStaticPage();
            }
        });
    }

    function setupShareLinks(title) {
        document.getElementById('shareSection').style.display = 'block';
        const url = window.location.href;
        const text = encodeURIComponent(title + "\n" + url);
        
        document.getElementById('shareWA').href = `https://api.whatsapp.com/send?text=${text}`;
        document.getElementById('shareFB').href = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
        document.getElementById('shareTW').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`;
    }

    function renderNavigation(posts, currentIndex) {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        document.getElementById('postNav').style.display = 'flex';

        if (currentIndex > 0) {
            const prevPath = posts[currentIndex - 1].url.replace('posts/', '').replace('.html', '');
            prevBtn.href = `${repo}/${prevPath}`;
        } else { prevBtn.classList.add('disabled'); }

        if (currentIndex < posts.length - 1) {
            const nextPath = posts[currentIndex + 1].url.replace('posts/', '').replace('.html', '');
            nextBtn.href = `${repo}/${nextPath}`;
        } else { nextBtn.classList.add('disabled'); }
    }

    function loadPostContent(url, title) {
        document.getElementById('postTitle').innerText = title;
        fetch(url).then(res => res.text()).then(html => {
            const temp = document.createElement('div');
            temp.innerHTML = html;
            const extras = temp.querySelectorAll('header, footer, nav, style, script');
            extras.forEach(e => e.remove());
            document.getElementById('postContent').innerHTML = temp.innerHTML;
        });
    }

    function loadStaticPage() {
        fetch(`${repo}/data/pages.json`).then(res => res.json()).then(pages => {
            const page = pages.find(p => p.id === cleanId);
            if (page) loadPostContent(`${repo}/${page.file}`, page.title);
        });
    }

    function updateSEO(title, desc) {
        document.title = title + " - Namo Narayanaya";
        const focusWords = title.split(' ').slice(0, 4).join(' ');
        let meta = document.querySelector('meta[name="keywords"]');
        if(!meta) { meta = document.createElement('meta'); meta.name="keywords"; document.head.appendChild(meta); }
        meta.setAttribute("content", focusWords + ", Dasabodha Telugu, Namo Narayanaya");
    }
</script>
</body>
</html>
