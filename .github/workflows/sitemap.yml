name: Generate Sitemap

on:
  push:
    branches:
      - main
    paths:
      # Trigger only when these files change
      - 'posts/**'
      - 'data/**'
      - 'generate-sitemap.js'
      # sitemap.xml is NOT listed here, so it won't trigger a loop

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Sitemap Script
        run: npm run build

      - name: Commit and Push Sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain sitemap.xml)" ]; then
            git add sitemap.xml
            git commit -m "Automated sitemap update [skip ci]"
            git push
          else
            echo "No changes detected in sitemap.xml"
          fi
